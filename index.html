<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ANGEL ANSWERS — DEEP PSYCHO ORACLE</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root{
    --bg:#020617;
    --panel:rgba(15,23,42,.9);
    --line:rgba(255,255,255,.1);
    --gold:#facc15;
    --violet:#a855f7;
}

body{
    font-family: system-ui, "Segoe UI", sans-serif;
    background: radial-gradient(circle at 50% 15%, #312e81 0%, #1e1b4b 45%, #020617 100%);
    color:#f1f5f9;
    min-height:100vh;
    padding:20px 30px 100px;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image: radial-gradient(rgba(192,132,252,.9) 1px, transparent 1px);
    background-size: 55px 55px;
    opacity:0.13;
    animation:stars 200s linear infinite;
    pointer-events:none;
}

@keyframes stars { from { transform: translateY(0); } to { transform: translateY(220px); } }

.container { max-width:1500px; margin:auto; position:relative; z-index:2; }

.title{
    text-align:center;
    font-size:clamp(46px, 8vw, 72px);
    font-weight:900;
    letter-spacing:5px;
    background:linear-gradient(90deg,#ddd6fe,#f0abfc,#c4b5fd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin:15px 0 10px;
}

.subtitle{
    text-align:center;
    color:#c4b5fd;
    letter-spacing:6px;
    font-size:15px;
    margin-bottom:45px;
}

.panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:32px;
    padding:35px;
    backdrop-filter:blur(20px);
    box-shadow:0 25px 50px -12px rgba(0,0,0,0.6);
}

.grid { display:grid; grid-template-columns:1fr 1fr; gap:32px; }
@media(max-width:920px){ .grid{grid-template-columns:1fr;} }

label{
    display:block;
    margin:18px 0 9px;
    font-size:14px;
    letter-spacing:2px;
    color:#c4b5fd;
    font-weight:600;
}

textarea, select{
    width:100%;
    background:#0f172a;
    border:1px solid rgba(165,243,252,.2);
    border-radius:20px;
    padding:16px 20px;
    color:white;
    font-size:16.5px;
}
textarea { min-height:145px; resize:vertical; line-height:1.65; }

.mainBtn{
    width:100%;
    margin-top:25px;
    padding:19px;
    font-size:18px;
    font-weight:800;
    background:linear-gradient(135deg,#7c3aed,#db2777);
    color:white;
    border:none;
    border-radius:9999px;
    cursor:pointer;
    transition:all .4s;
}
.mainBtn:hover{
    transform:translateY(-4px);
    box-shadow:0 20px 25px -5px rgba(192,132,252,.5);
}

.status { margin-top:24px; text-align:center; color:#a5b4fc; font-size:15px; min-height:30px; }

.deckZone { display:none; margin-top:35px; }
.massDeck{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(138px,1fr));
    gap:24px;
}

.pickCard{
    aspect-ratio:2/3.05;
    perspective:2200px;
    cursor:pointer;
    user-select:none;
}

.pickInner{
    position:relative;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition:transform 0.95s cubic-bezier(0.25,0.1,0.25,1);
    border-radius:28px;
}

.pickCard.selected .pickInner { transform:rotateY(180deg); }

.face{
    position:absolute;
    inset:0;
    border-radius:28px;
    backface-visibility:hidden;
    box-shadow:0 15px 35px -10px rgba(0,0,0,0.7);
}

.back{
    background:linear-gradient(135deg,#4c1d95,#1e123f);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:78px;
    color:rgba(216,180,254,0.85);
}

.front{
    transform:rotateY(180deg);
    background:linear-gradient(145deg,#1e2937,#0f172a);
    padding:20px;
    display:flex;
    flex-direction:column;
    text-align:center;
    border:1px solid rgba(165,243,252,.15);
}

.role { font-size:12px; letter-spacing:3px; color:#bae6fd; margin-bottom:6px; font-weight:700; }
.cardTitle { font-size:19.5px; font-weight:900; margin:10px 0 12px; line-height:1.2; }
.cardMeaning { font-size:14px; line-height:1.7; color:#e0f2fe; }

.positive .cardTitle { color:#fde047; }
.negative .cardTitle { color:#fb7185; }
.love .cardTitle { color:#f472b6; }
.shadow .cardTitle { color:#c084fc; }
.spiritual .cardTitle { color:#67e8f9; }
.action .cardTitle { color:#fb923c; }
.neutral .cardTitle { color:#94a3b8; }

.readingBox{
    display:none;
    margin-top:45px;
    padding:42px;
    border-radius:32px;
    background:rgba(15,23,42,0.96);
    border:1px solid rgba(165,243,252,.2);
    line-height:1.88;
    font-size:15.8px;
    box-shadow:0 30px 60px -15px rgba(0,0,0,0.7);
    white-space:pre-wrap;
}

.readingBox h2{
    text-align:center;
    font-size:38px;
    margin-bottom:30px;
    background:linear-gradient(90deg,#ddd6fe,#f0abfc);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.mysticLine{
    height:1px;
    background:linear-gradient(90deg,transparent,#67e8f9,transparent);
    margin:35px 0;
}
</style>
</head>
<body>

<div class="container">
    <div class="title">👼 ANGEL ANSWERS 👼</div>
    <div class="subtitle">DEEP PSYCHO ORACLE SYSTEM</div>

    <div class="panel">
        <div class="grid">
            <div>
                <label>あなたの質問</label>
                <textarea id="question" placeholder="例：あの人は今、私のことをどう思っていますか？　私たちは将来どうなるでしょうか？"></textarea>
            </div>
            <div>
                <label>テーマ</label>
                <select id="theme">
                    <option value="love">恋愛・片思い</option>
                    <option value="relationship">人間関係</option>
                    <option value="future">未来・運命</option>
                    <option value="work">仕事・キャリア</option>
                    <option value="spiritual">スピリチュアル・魂の旅</option>
                    <option value="general" selected>総合・深層心理</option>
                </select>

                <label style="margin-top:28px">スプレッド</label>
                <select id="spreadType">
                    <option value="3">3枚展開</option>
                    <option value="5" selected>5枚深層展開</option>
                    <option value="7">7枚運命解析</option>
                </select>
            </div>
        </div>

        <button class="mainBtn" onclick="startReading()">✨ 神託を開始する ✨</button>
        <div class="status" id="status">心を静め、質問を深く念じてください</div>
    </div>

    <div class="deckZone" id="deckZone">
        <div style="text-align:center;margin-bottom:20px;font-size:15px;letter-spacing:2px;color:#c4b5fd;" id="deckGuide">直感でカードを選択してください</div>
        <div class="selectionCount" id="selectionCount" style="text-align:center;font-size:23px;font-weight:900;color:#facc15;margin:20px 0 30px;"></div>
        <div class="massDeck" id="massDeck"></div>
    </div>

    <div class="readingBox" id="readingBox"></div>
</div>

<script>
// ==================== CARD DATABASE ====================
const cardsDB = [ /* 前回と同じ20枚（省略せず完全記載） */
    {name:"YES", type:"positive", energy:{emotion:75,truth:85,movement:70,fear:25,avoidance:15,attachment:45}, meanings:["流れは明確に前向きです。","肯定のサインが強く出ています。"]},
    {name:"NO", type:"negative", energy:{emotion:25,truth:90,movement:15,fear:80,avoidance:85,attachment:20}, meanings:["現時点では受け入れが難しい","方向性が合っていません。"]},
    {name:"WAIT", type:"neutral", energy:{emotion:55,truth:80,movement:10,fear:70,avoidance:65,attachment:50}, meanings:["今は静かに待つ時期です。","タイミングが整うのを待って。"]},
    {name:"ROMANCE", type:"love", energy:{emotion:98,truth:60,movement:65,fear:35,avoidance:25,attachment:92}, meanings:["強い恋愛感情が動いています。","心が熱く揺れています。"]},
    {name:"SOULMATE", type:"spiritual", energy:{emotion:100,truth:92,movement:75,fear:18,avoidance:12,attachment:100}, meanings:["魂レベルの深い縁があります。","運命的なつながりを感じます。"]},
    {name:"DECEPTION", type:"shadow", energy:{emotion:45,truth:40,movement:20,fear:88,avoidance:92,attachment:30}, meanings:["本音を隠しています。","防衛的な態度を取っています。"]},
    {name:"FALSE HOPE", type:"shadow", energy:{emotion:82,truth:35,movement:15,fear:55,avoidance:30,attachment:88}, meanings:["理想化しすぎています。","幻想に囚われています。"]},
    {name:"TAKE ACTION", type:"action", energy:{emotion:60,truth:75,movement:100,fear:20,avoidance:10,attachment:55}, meanings:["行動が鍵を握っています。","一歩を踏み出すことで道が開けます。"]},
    {name:"HEALING", type:"spiritual", energy:{emotion:85,truth:88,movement:45,fear:30,avoidance:25,attachment:40}, meanings:["癒しのプロセスが始まっています。","心の傷が癒されつつあります。"]},
    {name:"BREAKTHROUGH", type:"positive", energy:{emotion:70,truth:85,movement:95,fear:22,avoidance:18,attachment:35}, meanings:["突破口が見えています。","大きな変化の前兆です。"]},
    {name:"SEPARATION", type:"negative", energy:{emotion:40,truth:70,movement:25,fear:75,avoidance:80,attachment:60}, meanings:["距離が生まれています。","一時的な分離の時期です。"]},
    {name:"PASSION", type:"love", energy:{emotion:95,truth:65,movement:85,fear:28,avoidance:20,attachment:75}, meanings:["情熱が再燃しています。","強い引力が働いています。"]},
    {name:"CONFUSION", type:"shadow", energy:{emotion:65,truth:30,movement:35,fear:70,avoidance:60,attachment:55}, meanings:["心が混乱しています。","方向性が見えにくい状態です。"]},
    {name:"UNION", type:"love", energy:{emotion:90,truth:80,movement:70,fear:25,avoidance:22,attachment:85}, meanings:["結びつきが強まっています。","統合のエネルギーが働いています。"]},
    {name:"RELEASE", type:"action", energy:{emotion:50,truth:85,movement:80,fear:40,avoidance:35,attachment:30}, meanings:["手放すことで自由になります。","執着を解放してください。"]},
    {name:"DESTINY", type:"spiritual", energy:{emotion:88,truth:95,movement:60,fear:15,avoidance:12,attachment:70}, meanings:["運命の歯車が回り始めています。","避けられない流れです。"]},
    {name:"FEAR", type:"shadow", energy:{emotion:30,truth:70,movement:20,fear:100,avoidance:95,attachment:65}, meanings:["深い恐れが支配しています。","不安が行動を阻んでいます。"]},
    {name:"TRUST", type:"positive", energy:{emotion:85,truth:90,movement:65,fear:25,avoidance:20,attachment:40}, meanings:["信頼を置くべきタイミングです。","安心して委ねてください。"]},
    {name:"TRANSFORMATION", type:"action", energy:{emotion:75,truth:80,movement:90,fear:45,avoidance:30,attachment:50}, meanings:["大きな変容が起きています。","生まれ変わりの時期です。"]},
    {name:"BALANCE", type:"neutral", energy:{emotion:70,truth:85,movement:50,fear:35,avoidance:40,attachment:45}, meanings:["調和を取り戻す時期です。","バランスが鍵になります。"]}
];

const roles = {
    3: ["過去", "現在", "未来"],
    5: ["現状", "障害", "本音", "必要な行動", "結果"],
    7: ["現状", "潜在意識", "相手の本音", "障害", "必要な行動", "近未来", "最終結果"]
};

let currentReading = [];
let currentSpread = 5;
let currentQuestion = "";

// Utility
function secureRandom(max){ const arr=new Uint32Array(1); crypto.getRandomValues(arr); return arr[0]%max; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=secureRandom(i+1); [a[i],a[j]]=[a[j],a[i]]; } }
function randomItem(arr){ return arr[secureRandom(arr.length)]; }

function playTone(freq=540, dur=0.4){
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=freq; o.type="sine";
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.09,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
}

// Start
function startReading(){
    const q = document.getElementById("question").value.trim();
    if(!q){ alert("質問を入力してください"); return; }

    currentQuestion = q;
    currentSpread = parseInt(document.getElementById("spreadType").value);
    currentReading = [];

    document.getElementById("deckZone").style.display = "block";
    document.getElementById("readingBox").style.display = "none";
    document.getElementById("selectionCount").innerHTML = `0 / ${currentSpread}`;
    document.getElementById("status").innerHTML = "直感に従ってカードをめくってください";

    createDeck();
}

function createDeck(){
    const deckEl = document.getElementById("massDeck");
    deckEl.innerHTML = "";

    let pool = [];
    for(let i=0; i<35; i++) pool.push({...cardsDB[secureRandom(cardsDB.length)]});
    shuffle(pool);

    let selected = 0;

    pool.forEach(card => {
        const div = document.createElement("div");
        div.className = "pickCard";
        div.innerHTML = `
            <div class="pickInner">
                <div class="face back">✦</div>
                <div class="face front ${card.type}">
                    <div class="role">---</div>
                    <div class="cardTitle">${card.name}</div>
                    <div class="cardMeaning">${randomItem(card.meanings)}</div>
                </div>
            </div>
        `;

        let opened = false;
        div.onclick = () => {
            if(opened || selected >= currentSpread) return;
            opened = true;
            div.classList.add("selected");
            playTone(480 + secureRandom(220), 0.45);

            const role = roles[currentSpread][selected];
            div.querySelector(".role").textContent = role;

            currentReading.push({role, card});

            selected++;
            document.getElementById("selectionCount").innerHTML = `${selected} / ${currentSpread}`;

            if(selected === currentSpread){
                setTimeout(generateReading, 1350);
            }
        };
        deckEl.appendChild(div);
    });
}

// ==================== 完全強化版リーディングエンジン ====================
function generateReading(){
    const box = document.getElementById("readingBox");
    const theme = document.getElementById("theme").value;

    // エネルギー平均
    let energy = {emotion:0,truth:0,movement:0,fear:0,avoidance:0,attachment:0};
    currentReading.forEach(r => {
        Object.keys(energy).forEach(k => energy[k] += r.card.energy[k]);
    });
    Object.keys(energy).forEach(k => energy[k] = Math.round(energy[k] / currentReading.length));

    const names = currentReading.map(r => r.card.name);
    const has = (card) => names.includes(card);

    let text = `🔮 DIVINE ORACLE READING 🔮\n\n`;
    text += `質問：${currentQuestion}\n\n`;
    text += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

    // 個別カード
    currentReading.forEach(r => {
        text += `\( {r.role}　【 \){r.card.name}】\n`;
        text += `${randomItem(r.card.meanings)}\n\n`;
    });

    text += `━━━━━━━━━━━━━━━━━━━━━━\n\n`;

    // 深層分析
    text += `【全体の感情構造】\n`;
    if(energy.emotion >= 82) text += "感情エネルギーが非常に強く、情熱的です。\n";
    else if(energy.emotion >= 65) text += "感情は活発ですが、波や揺らぎがあります。\n";
    else text += "感情面は比較的抑制されています。\n";

    if(energy.fear >= 75 || energy.avoidance >= 75){
        text += "同時に強い防衛機制・恐れが働いており、心の壁が厚くなっています。\n";
    }
    if(energy.attachment >= 80 && energy.avoidance >= 60){
        text += "近づきたいのに逃げてしまう「接近回避型」の葛藤が強く出ています。\n";
    }
    text += `\n`;

    text += `【核心メッセージ】\n`;
    if(has("SOULMATE") || has("DESTINY")){
        text += "これは魂レベルでのつながり・運命的な縁です。偶然ではありません。\n";
    }
    if(has("ROMANCE") || has("PASSION") || has("UNION")){
        text += "恋愛的・情熱的なエネルギーが強く働いています。\n";
    }
    if(has("DECEPTION") || has("FEAR") || has("CONFUSION")){
        text += "本音や恐れが関係を複雑化させています。表面的な言葉ではなく、心の奥に耳を澄ませてください。\n";
    }
    if(has("BREAKTHROUGH") || has("TRANSFORMATION")){
        text += "大きな転機・変容の時期に入っています。\n";
    }
    text += `\n`;

    text += `【心理・無意識の洞察】\n`;
    if(has("FALSE HOPE")) text += "理想化や幻想が現実を見えにくくしています。\n";
    if(has("WAIT")) text += "今は行動ではなく、内面的な整理・熟成の時間です。\n";
    if(has("RELEASE")) text += "執着を手放すことで、新たな流れが自然に生まれます。\n";
    text += `\n`;

    text += `【今後取るべき行動】\n`;
    if(energy.movement >= 78){
        text += "積極的に行動することで道が開けます。迷わず一歩を踏み出してください。\n";
    } else if(has("TAKE ACTION") || has("TRANSFORMATION")){
        text += "待つだけでなく、自分から動き出す勇気が必要です。\n";
    } else {
        text += "焦らず、まずは自分自身の心を癒し・整えることに集中してください。\n";
    }
    text += `\n`;

    text += `【最終的な展望】\n`;
    if(has("YES") || has("BREAKTHROUGH") || has("UNION")){
        text += "最終的には肯定的な方向へ収束する可能性が非常に高いです。\n";
    } else if(has("NO") || has("SEPARATION")){
        text += "現時点では難しいですが、手放すことでより良い縁が訪れるでしょう。\n";
    } else if(energy.fear < 45 && energy.movement > 60){
        text += "穏やかで自然な形で良い方向へ進展します。\n";
    } else {
        text += "水面下で変化が進行中です。信頼と忍耐が鍵となります。\n";
    }

    // テーマ別追加メッセージ
    if(theme === "love"){
        text += `\n【恋愛特化メッセージ】\n`;
        if(has("ROMANCE") || has("PASSION")){
            text += "相手の心はあなたに向かって動いています。ただ、恐れやプライドが邪魔をしている可能性があります。\n";
        }
        if(has("SOULMATE")){
            text += "これは一時的なものではなく、魂の伴侶レベルの縁です。焦らず育んでください。\n";
        }
    }

    text += `\n── 天使からの言葉 ──\n`;
    text += "あなたの心が真に求めているものは、すでにその内側にあります。恐れを優しく手放し、流れを信じてください。";

    box.innerHTML = `<h2>🔮 DIVINE ORACLE READING 🔮</h2><pre style="font-family:inherit;white-space:pre-wrap;">${text}</pre>`;
    box.style.display = "block";
    box.scrollIntoView({behavior:"smooth", block:"start"});
}
</script>
</body>
</html>
