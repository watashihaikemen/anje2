<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Linker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --player-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent-color: #ff0000; 
            --list-hover: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 900px;
            max-width: 100%;
            height: 600px;
            background-color: var(--player-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* 左側：プレイリストエリア */
        .sidebar {
            width: 40%;
            border-right: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #282828;
        }

        .track-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .track-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #232323;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .track-item:hover {
            background-color: var(--list-hover);
        }

        .track-item.active {
            background-color: #282828;
            border-left: 4px solid var(--accent-color);
        }

        .track-item .track-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item .track-artist {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        /* 右側：メインプレイヤーエリア */
        .main-player {
            width: 60%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        /* アートワーク（YouTubeサムネイル） */
        .album-art {
            width: 260px;
            height: 260px;
            background-color: #333;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            background-size: cover;
            background-position: center;
        }

        /* 現在の曲情報 */
        .now-playing {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
        }

        .now-playing .current-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .current-artist {
            font-size: 1rem;
            color: var(--text-sub);
        }

        /* 音楽プレイヤー用コントロールボタン */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 30px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .btn:hover {
            color: var(--text-main);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* YouTubeを開く専用の大きな再生ボタン */
        .btn-youtube-play {
            padding: 12px 30px;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.3);
        }

        .btn-youtube-play:hover {
            background-color: #e60000;
            transform: scale(1.03);
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse;
                height: auto;
            }
            .sidebar {
                width: 100%;
                height: 350px;
            }
            .main-player {
                width: 100%;
                padding: 30px 20px;
            }
            .album-art {
                width: 200px;
                height: 200px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">プレイリスト</div>
        <ul class="track-list" id="playlist"></ul>
    </div>

    <div class="main-player">
        <div class="album-art" id="album-art"></div>

        <div class="now-playing">
            <div class="current-title" id="current-title">曲を選択してください</div>
            <div class="current-artist" id="current-artist">-</div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-prev" title="前の曲"><i class="fas fa-step-backward"></i> 前の曲</button>
            <button class="btn" id="btn-next" title="次の曲"><i class="fas fa-step-forward"></i> 次の曲</button>
        </div>

        <a href="#" target="_blank" class="btn-youtube-play" id="btn-youtube">
            <i class="fab fa-youtube"></i> YouTubeで再生する
        </a>
    </div>
</div>

<script>
    // 指定された全16曲のデータ
    const tracks = [
        { artist: "カネコアヤノ", title: "恋しい日々", id: "O0aA77rXw0M" },
        { artist: "カネコアヤノ", title: "眠れない", id: "5o6L437vQjE" },
        { artist: "カネコアヤノ", title: "マジックペンと君の名前", id: "fN-99e2X1zY" },
        { artist: "カネコアヤノ", title: "明け方", id: "1vY-iXvUe9Q" },
        { artist: "羊文学", title: "step", id: "8W_tX770Txs" },
        { artist: "羊文学", title: "ハイウェイ", id: "S4bT6tLw2cM" },
        { artist: "羊文学", title: "1999", id: "S6pE0NWhuU0" },
        { artist: "羊文学", title: "マフラー", id: "6-Uq6q9f0zM" },
        { artist: "Laura day romance", title: "Young Life", id: "o2Lg6E1rC0I" },
        { artist: "teto", title: "9月になること", id: "nEorl9wM_xM" },
        { artist: "teto", title: "My i my", id: "p0vDRE7C4m4" },
        { artist: "Helsinki Lambda Club", title: "Lost in the super market", id: "SWeuVz1wO_k" },
        { artist: "オレンジスパイニクラブ", title: "敏感少女", id: "FpCH_0_5KTo" },
        { artist: "オレンジスパイニクラブ", title: "デイリーネイビークレイジー", id: "zW1S8w9M6_Q" },
        { artist: "オレンジスパイニクラブ", title: "タルパ", id: "U-o_MbeE9-w" },
        { artist: "オレンジスパイニクラブ", title: "デイリーネイビークレイジー (2)", id: "zW1S8w9M6_Q" }
    ];

    let currentIndex = 0;

    // 初期化
    function initPlayer() {
        renderPlaylist();
        selectTrack(0);
    }

    // リスト描画
    function renderPlaylist() {
        const playlistEl = document.getElementById('playlist');
        playlistEl.innerHTML = '';
        tracks.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentIndex ? 'active' : ''}`;
            li.innerHTML = `
                <span class="track-title">${track.title}</span>
                <span class="track-artist">${track.artist}</span>
            `;
            li.onclick = () => selectTrack(index);
            playlistEl.appendChild(li);
        });
    }

    // 曲の選択・変更処理
    function selectTrack(index) {
        currentIndex = index;
        const track = tracks[currentIndex];

        // 画面の情報を更新
        document.getElementById('current-title').innerText = track.title;
        document.getElementById('current-artist').innerText = track.artist;
        document.getElementById('album-art').style.backgroundImage = `url('https://img.youtube.com/vi/${track.id}/hqdefault.jpg')`;

        // YouTubeの直リンクURLを動的に生成してボタンに付与
        document.getElementById('btn-youtube').href = `https://www.youtube.com/watch?v=${track.id}`;

        // リストのアクティブ状態を変更
        const items = document.querySelectorAll('.track-item');
        items.forEach((item, idx) => {
            if (idx === currentIndex) {
                item.classList.add('active');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                item.classList.remove('active');
            }
        });
    }

    function nextTrack() {
        let nextIndex = (currentIndex + 1) % tracks.length;
        selectTrack(nextIndex);
    }

    function prevTrack() {
        let nextIndex = (currentIndex - 1 + tracks.length) % tracks.length;
        selectTrack(nextIndex);
    }

    // ボタンのイベント紐付け
    document.getElementById('btn-next').addEventListener('click', nextTrack);
    document.getElementById('btn-prev').addEventListener('click', prevTrack);

    // 起動
    initPlayer();
</script>
</body>
</html>
