<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Web Music Player</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-color: #1a1a22;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --accent-color: #1db954; /* 鮮やかなグリーン */
            --accent-hover: #1ed760;
            --control-bg: #2a2a36;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 全体コンテナ（レスポンシブ：PCでは横並び、スマホでは縦並び） */
        .wrapper {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            max-width: 960px;
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ==========================================================
           プレイヤー本体スタイル
        ========================================================== */
        .player-container {
            flex: 1;
            background-color: var(--card-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            min-width: 320px;
        }

        /* YouTube画面表示エリア（音楽プレイヤーのディスプレイ風） */
        .video-screen {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 アスペクト比 */
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .video-screen iframe, #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 曲情報 */
        .track-info {
            text-align: center;
            margin-top: 5px;
        }

        .track-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.95rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 進捗シークバー */
        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--control-bg);
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            background: var(--accent-hover);
        }

        /* コントロールボタン群 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            border-radius: 50%;
        }

        .btn:hover {
            color: var(--accent-color);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-small {
            width: 36px;
            height: 36px;
            color: var(--text-muted);
        }

        .btn-medium {
            width: 46px;
            height: 46px;
            background-color: var(--control-bg);
        }

        .btn-large {
            width: 60px;
            height: 60px;
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .btn-large:hover {
            background-color: var(--accent-color);
            color: var(--text-color);
        }

        /* トグルボタン（シャッフル・リピート）のON状態 */
        .btn.active {
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        /* 音量コントロール */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 60%;
            margin: 0 auto;
        }

        .volume-container svg {
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
        }

        /* ==========================================================
           プレイリストスタイル
        ========================================================== */
        .playlist-container {
            width: 380px;
            background-color: var(--card-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .playlist-header {
            font-size: 1.1rem;
            font-weight: 700;
            border-bottom: 1px solid var(--control-bg);
            padding-bottom: 10px;
        }

        .track-list {
            list-style: none;
            overflow-y: auto;
            max-height: 400px;
            padding-right: 5px;
        }

        /* カスタムスクロールバー */
        .track-list::-webkit-scrollbar {
            width: 6px;
        }
        .track-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .track-list::-webkit-scrollbar-thumb {
            background: var(--control-bg);
            border-radius: 3px;
        }

        .track-item {
            display: flex;
            flex-direction: column;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 4px;
        }

        .track-item:hover {
            background-color: var(--control-bg);
        }

        .track-item.playing {
            background-color: rgba(29, 185, 84, 0.15);
            border-left: 4px solid var(--accent-color);
        }

        .track-item.playing .list-title {
            color: var(--accent-color);
        }

        .list-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .list-artist {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* レスポンシブ対応 */
        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
            }
            .playlist-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="player-container">
        <div class="video-screen">
            <div id="youtube-player"></div>
        </div>

        <div class="track-info">
            <div id="current-title" class="track-title">曲を選択してください</div>
            <div id="current-artist" class="track-artist">-</div>
        </div>

        <div class="progress-container">
            <input type="range" id="progress-bar" class="slider" value="0" max="100" step="1">
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button id="shuffle-btn" class="btn btn-small" title="シャッフル">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20l7-7M21 3L11 13M15 21h6v-5M4 4l17 17"/></svg>
            </button>
            <button id="prev-btn" class="btn btn-medium" title="前の曲">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 7l8.5 6V6z"/></svg>
            </button>
            <button id="play-btn" class="btn btn-large" title="再生">
                <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button id="next-btn" class="btn btn-medium" title="次の曲">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button id="repeat-btn" class="btn btn-small" title="リピート">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
            </button>
        </div>

        <div class="volume-container">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <input type="range" id="volume-bar" class="slider" value="50" max="100">
        </div>
    </div>

    <div class="playlist-container">
        <div class="playlist-header">プレイリスト (<span id="track-count">0</span>)</div>
        <ul id="track-list" class="track-list">
            </ul>
    </div>
</div>

<script>
    // ==========================================================
    // 【最重要】楽曲データ管理配列
    // 曲やアーティストを追加・変更する場合は、ここを増減させるだけで自動反映されます。
    // ==========================================================
    const songs = [
        { artist: 'カネコアヤノ', title: '恋しい日々', id: 'F6yREcKv3EI' },
        { artist: 'カネコアヤノ', title: '眠れない', id: 'wyLuh2uC0cg' },
        { artist: 'カネコアヤノ', title: 'マジックペンと君の名前', id: 'f_4S86mN78M' },
        { artist: 'カネコアヤノ', title: '明け方', id: 'Y7vD0GAnlsk' },
        
        { artist: '羊文学', title: 'step', id: '_g4fVuwgUg0' },
        { artist: '羊文学', title: 'ハイウェイ', id: '6xmtzQu-aaU' },
        { artist: '羊文学', title: '1999', id: '2v8iq3tI0gM' },
        { artist: '羊文学', title: 'マフラー', id: 'g0YjWvW_HDo' },
        
        { artist: 'Laura day romance', title: 'Young Life', id: 'TL2T4PoJNWQ' },
        
        { artist: 'teto', title: '9月になること', id: 'Ng3tAEa0NQM' },
        { artist: 'teto', title: 'My i my', id: '8Wby-C3_n-s' },
        
        { artist: 'Helsinki Lambda Club', title: 'Lost in the super market', id: 'KIsOisN6zKk' },
        
        { artist: 'オレンジスパイニクラブ', title: '敏感少女', id: 'Xba4y0IIghQ' },
        { artist: 'オレンジスパイニクラブ', title: 'デイリーネイビークレイジー', id: 'p0w936O-Ito' },
        { artist: 'オレンジスパイニクラブ', title: 'タルパ', id: 'aGXd5e1EukQ' }
    ];

    let player;
    let currentIndex = 0;
    let isPlaying = false;
    let isShuffle = false;
    let isRepeat = false;
    let updateTimer;

    // YouTube Iframe Player APIの読み込み
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // DOM要素の取得
    const trackListEl = document.getElementById('track-list');
    const trackCountEl = document.getElementById('track-count');
    const currentTitleEl = document.getElementById('current-title');
    const currentArtistEl = document.getElementById('current-artist');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const repeatBtn = document.getElementById('repeat-btn');
    const progressBar = document.getElementById('progress-bar');
    const volumeBar = document.getElementById('volume-bar');
    const currentTimeEl = document.getElementById('current-time');
    const totalDurationEl = document.getElementById('total-duration');

    // 初期化処理: リストの描画
    function initPlaylist() {
        trackCountEl.textContent = songs.length;
        trackListEl.innerHTML = '';
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentIndex ? 'playing' : ''}`;
            li.innerHTML = `
                <div class="list-title">${song.title}</div>
                <div class="list-artist">${song.artist}</div>
            `;
            li.addEventListener('click', () => selectTrack(index));
            trackListEl.appendChild(li);
        });
        updatePlayerUI();
    }

    // YouTube API 準備完了時のコールバック
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '100%',
            width: '100%',
            videoId: songs[currentIndex].id,
            playerVars: {
                'controls': 0,          // 独自のUIを使用するためYouTube標準コントロールは非表示
                'disablekb': 1,        // キーボード操作無効
                'rel': 0,              // 関連動画非表示
                'modestbranding': 1    // ロゴを控えめに
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        initPlaylist();
        player.setVolume(volumeBar.value);
        // シークバーの入力を監視
        progressBar.addEventListener('input', onSeek);
        volumeBar.addEventListener('input', onVolumeChange);
    }

    function onPlayerStateChange(event) {
        // 再生状態の同期
        if (event.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            setPlayIcon(true);
            startTimer();
            progressBar.max = Math.floor(player.getDuration());
            totalDurationEl.textContent = formatTime(player.getDuration());
        } else if (event.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            setPlayIcon(false);
            clearInterval(updateTimer);
        } else if (event.data === YT.PlayerState.ENDED) {
            clearInterval(updateTimer);
            handleTrackEnded();
        }
    }

    // 再生・一時停止のアイコン切り替え（SVGパスの変更）
    function setPlayIcon(playing) {
        if (playing) {
            // パスを「一時停止(縦棒2本)」に変更
            playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            playBtn.title = "一時停止";
        } else {
            // パスを「再生(右三角)」に変更
            playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            playBtn.title = "再生";
        }
    }

    // トラック選択
    function selectTrack(index) {
        if (index < 0 || index >= songs.length) return;
        currentIndex = index;
        
        // プレイリストのハイライト更新
        const items = trackListEl.querySelectorAll('.track-item');
        items.forEach((item, idx) => {
            if (idx === currentIndex) {
                item.classList.add('playing');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                item.classList.remove('playing');
            }
        });

        updatePlayerUI();
        player.loadVideoById(songs[currentIndex].id);
    }

    // メインUIの情報更新
    function updatePlayerUI() {
        currentTitleEl.textContent = songs[currentIndex].title;
        currentArtistEl.textContent = songs[currentIndex].artist;
        progressBar.value = 0;
        currentTimeEl.textContent = "0:00";
    }

    // タイマー駆動でシークバーと時間を更新
    function startTimer() {
        clearInterval(updateTimer);
        updateTimer = setInterval(() => {
            if (player && typeof player.getCurrentTime === 'function') {
                const current = Math.floor(player.getCurrentTime());
                progressBar.value = current;
                currentTimeEl.textContent = formatTime(current);
            }
        }, 1000);
    }

    // ユーザーによるシーク操作
    function onSeek() {
        player.seekTo(progressBar.value, true);
        currentTimeEl.textContent = formatTime(progressBar.value);
    }

    // ボリューム変更
    function onVolumeChange() {
        player.setVolume(volumeBar.value);
    }

    // 曲が終了したときのロジック（シャッフル・リピート制御）
    function handleTrackEnded() {
        if (isRepeat) {
            // 単曲リピート
            player.playVideo();
        } else {
            // 次の曲へ進む
            nextTrack();
        }
    }

    // 次の曲
    function nextTrack() {
        if (isShuffle) {
            const randomIndex = Math.floor(Math.random() * songs.length);
            selectTrack(randomIndex);
        } else {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= songs.length) nextIndex = 0; // ループ
            selectTrack(nextIndex);
        }
    }

    // 前の曲
    function prevTrack() {
        let prevIndex = currentIndex - 1;
        if (prevIndex < 0) prevIndex = songs.length - 1; // 最後にループ
        selectTrack(prevIndex);
    }

    // 秒数を「分:秒」に変換
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    /* ==========================================================
       イベントリスナー群（ボタン系）
    ========================================================== */
    playBtn.addEventListener('click', () => {
        if (isPlaying) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    });

    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active', isShuffle);
    });

    repeatBtn.addEventListener('click', () => {
        isRepeat = !isRepeat;
        repeatBtn.classList.toggle('active', isRepeat);
    });
</script>

</body>
</html>
