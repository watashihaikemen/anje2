<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ANGEL ANSWERS — DEEP PSYCHO ORACLE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#020617;
--panel:rgba(15,23,42,.82);
--line:rgba(255,255,255,.08);
--gold:#facc15;
--violet:#8b5cf6;
--pink:#ec4899;
--blue:#60a5fa;
--red:#ef4444;
--white:#f8fafc;
}

body{
font-family:"Segoe UI",sans-serif;
background:
radial-gradient(circle at top,#312e81 0%,#0f172a 35%,#020617 100%);
color:white;
min-height:100vh;
overflow-x:hidden;
padding:30px;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
opacity:.12;
background-image:
radial-gradient(rgba(255,255,255,.9) 1px,transparent 1px);
background-size:42px 42px;
animation:stars 120s linear infinite;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(140px);}
}

.container{
max-width:1500px;
margin:auto;
position:relative;
z-index:2;
}

.title{
text-align:center;
font-size:54px;
font-weight:900;
letter-spacing:3px;
margin-top:10px;
text-shadow:0 0 25px rgba(255,255,255,.35);
}

.subtitle{
text-align:center;
margin-top:10px;
color:#cbd5e1;
letter-spacing:4px;
font-size:14px;
margin-bottom:40px;
}

.panel{
background:var(--panel);
border:1px solid var(--line);
border-radius:30px;
padding:30px;
margin-bottom:28px;
backdrop-filter:blur(18px);
box-shadow:
0 0 35px rgba(0,0,0,.4),
inset 0 0 30px rgba(255,255,255,.03);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

label{
display:block;
margin-top:18px;
margin-bottom:10px;
font-size:13px;
letter-spacing:2px;
color:#cbd5e1;
}

textarea,
select,
button{
width:100%;
border:none;
border-radius:18px;
padding:16px;
font-size:16px;
}

textarea,
select{
background:#020617;
color:white;
}

textarea{
resize:none;
min-height:140px;
}

button{
font-weight:900;
cursor:pointer;
transition:.35s;
}

.mainBtn{
background:linear-gradient(135deg,#8b5cf6,#6366f1);
color:white;
margin-top:24px;
}

.mainBtn:hover{
transform:translateY(-3px);
box-shadow:0 0 30px rgba(139,92,246,.45);
}

.status{
margin-top:22px;
text-align:center;
color:#cbd5e1;
min-height:24px;
}

.deckZone{
display:none;
margin-top:28px;
}

.deckGuide{
text-align:center;
margin-bottom:20px;
letter-spacing:2px;
color:#e2e8f0;
}

.selectionCount{
text-align:center;
margin-bottom:24px;
font-size:18px;
font-weight:900;
color:var(--gold);
}

.massDeck{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:18px;
}

.pickCard{
position:relative;
aspect-ratio:2/3;
perspective:1800px;
cursor:pointer;
}

.pickInner{
position:absolute;
inset:0;
transform-style:preserve-3d;
transition:1s;
}

.pickCard.selected .pickInner{
transform:rotateY(180deg);
}

.face{
position:absolute;
inset:0;
border-radius:24px;
overflow:hidden;
backface-visibility:hidden;
}

.back{
background:
linear-gradient(135deg,#4338ca,#1e1b4b);
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
border:2px solid rgba(255,255,255,.08);
box-shadow:
0 0 30px rgba(139,92,246,.3),
inset 0 0 25px rgba(255,255,255,.04);
}

.front{
transform:rotateY(180deg);
padding:16px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:#0f172a;
border:1px solid rgba(255,255,255,.06);
}

.role{
font-size:11px;
letter-spacing:2px;
margin-bottom:12px;
color:#cbd5e1;
}

.cardTitle{
font-size:18px;
font-weight:900;
margin-bottom:14px;
line-height:1.3;
}

.cardMeaning{
font-size:13px;
line-height:1.7;
color:#d1d5db;
}

.positive .cardTitle{color:#facc15;}
.negative .cardTitle{color:#f87171;}
.love .cardTitle{color:#f472b6;}
.shadow .cardTitle{color:#c084fc;}
.spiritual .cardTitle{color:#93c5fd;}
.action .cardTitle{color:#fb923c;}

.readingBox{
display:none;
margin-top:35px;
padding:34px;
border-radius:30px;
background:rgba(15,23,42,.88);
border:1px solid rgba(255,255,255,.08);
line-height:2;
white-space:pre-wrap;
}

.readingBox h2{
margin-bottom:26px;
font-size:34px;
}

.mysticLine{
margin:28px 0;
height:1px;
background:
linear-gradient(90deg,
transparent,
rgba(255,255,255,.3),
transparent);
}

.tag{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:#312e81;
margin:4px;
font-size:13px;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.title{
font-size:38px;
}

.massDeck{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="container">

<div class="title">
👼 ANGEL ANSWERS 👼
</div>

<div class="subtitle">
DEEP PSYCHO ORACLE SYSTEM
</div>

<div class="panel">

<div class="grid">

<div>

<label>質問</label>

<textarea id="question"
placeholder="例：あの人は今どう思っていますか？"></textarea>

</div>

<div>

<label>テーマ</label>

<select id="theme">

<option value="love">恋愛</option>
<option value="relationship">人間関係</option>
<option value="future">未来</option>
<option value="work">仕事</option>
<option value="spiritual">スピリチュアル</option>

</select>

<label>スプレッド</label>

<select id="spreadType">

<option value="3">3枚展開</option>
<option value="5">5枚深層展開</option>
<option value="7">7枚運命解析</option>

</select>

</div>

</div>

<button class="mainBtn"
onclick="startReading()">

神託を開始する

</button>

<div class="status" id="status">
静かに質問を念じてください
</div>

</div>

<div class="deckZone" id="deckZone">

<div class="deckGuide">
直感でカードを選択してください
</div>

<div class="selectionCount"
id="selectionCount">
0 / 0
</div>

<div class="massDeck"
id="massDeck"></div>

</div>

<div class="readingBox"
id="readingBox"></div>

</div>

<script>

/* =========================
UTILITY
========================= */

function secureRandom(max){

const arr=new Uint32Array(1);

crypto.getRandomValues(arr);

return arr[0]%max;

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=secureRandom(i+1);

[array[i],array[j]]=
[array[j],array[i]];

}

}

function randomItem(arr){

return arr[secureRandom(arr.length)];

}

function escapeHTML(str){

return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");

}

/* =========================
AUDIO
========================= */

const audioCtx=
new(window.AudioContext||
window.webkitAudioContext)();

function tone(freq,duration=.4){

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.frequency.value=freq;

osc.connect(gain);
gain.connect(audioCtx.destination);

gain.gain.setValueAtTime(
0.03,
audioCtx.currentTime
);

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioCtx.currentTime+duration
);

osc.start();
osc.stop(audioCtx.currentTime+duration);

}

/* =========================
ROLES
========================= */

const roles={

3:["過去","現在","未来"],

5:[
"現状",
"障害",
"本音",
"行動",
"結果"
],

7:[
"現状",
"潜在意識",
"相手本音",
"障害",
"行動",
"近未来",
"最終結果"
]

};

/* =========================
CARD DATABASE
========================= */

const cards=[

{
name:"YES",
type:"positive",

energy:{
emotion:65,
truth:75,
movement:70,
fear:20,
avoidance:10,
attachment:40
},

meanings:[
"流れは前向きです。",
"現実ラインが繋がり始めています。"
]

},

{
name:"NO",
type:"negative",

energy:{
emotion:20,
truth:90,
movement:10,
fear:75,
avoidance:80,
attachment:15
},

meanings:[
"現段階では噛み合っていません。",
"動くほど崩れやすい状態です。"
]

},

{
name:"WAIT",
type:"neutral",

energy:{
emotion:50,
truth:80,
movement:5,
fear:65,
avoidance:55,
attachment:45
},

meanings:[
"感情整理が終わっていません。",
"タイミングが止まっています。"
]

},

{
name:"ROMANCE",
type:"love",

energy:{
emotion:95,
truth:65,
movement:60,
fear:40,
avoidance:20,
attachment:95
},

meanings:[
"感情はかなり強く動いています。",
"理性より感情が優勢です。"
]

},

{
name:"DECEPTION",
type:"shadow",

energy:{
emotion:40,
truth:95,
movement:20,
fear:90,
avoidance:90,
attachment:25
},

meanings:[
"本音を隠しています。",
"感情開示を恐れています。"
]

},

{
name:"SOULMATE",
type:"spiritual",

energy:{
emotion:100,
truth:90,
movement:70,
fear:15,
avoidance:10,
attachment:100
},

meanings:[
"魂レベルの共鳴があります。",
"偶然では終わらない縁です。"
]

},

{
name:"FALSE HOPE",
type:"shadow",

energy:{
emotion:80,
truth:90,
movement:10,
fear:60,
avoidance:25,
attachment:95
},

meanings:[
"理想化が強くなっています。",
"現実より期待が先行しています。"
]

},

{
name:"TAKE ACTION",
type:"action",

energy:{
emotion:55,
truth:70,
movement:100,
fear:15,
avoidance:5,
attachment:55
},

meanings:[
"停滞打破が必要です。",
"行動によって流れが変わります。"
]

}

];

/* =========================
STATE
========================= */

let currentReading=[];
let spread=0;
let currentQuestion="";

/* =========================
START
========================= */

function startReading(){

const q=
document.getElementById("question")
.value.trim();

if(q===""){

alert("質問を入力してください");
return;

}

currentQuestion=q;

spread=parseInt(
document.getElementById("spreadType")
.value
);

currentReading=[];

document.getElementById("deckZone")
.style.display="block";

document.getElementById("readingBox")
.style.display="none";

document.getElementById("selectionCount")
.innerHTML=`0 / ${spread}`;

document.getElementById("status")
.innerHTML=
"直感でカードを選択してください";

createDeck();

}

/* =========================
CREATE DECK
========================= */

function createDeck(){

const deck=
document.getElementById("massDeck");

deck.innerHTML="";

const display=[];

for(let i=0;i<28;i++){

display.push(
cards[secureRandom(cards.length)]
);

}

shuffle(display);

let selected=0;

display.forEach(card=>{

const div=document.createElement("div");

div.className="pickCard";

div.innerHTML=`

<div class="pickInner">

<div class="face back">
✦
</div>

<div class="face front ${card.type}">

<div class="role">---</div>

<div class="cardTitle">
${card.name}
</div>

<div class="cardMeaning">
${randomItem(card.meanings)}
</div>

</div>

</div>

`;

let opened=false;

div.addEventListener("click",()=>{

if(opened) return;

if(selected>=spread) return;

opened=true;

div.classList.add("selected");

tone([444,555,666][secureRandom(3)]);

const role=
roles[spread][selected];

div.querySelector(".role")
.innerHTML=role;

currentReading.push({
role,
card
});

selected++;

document.getElementById(
"selectionCount"
).innerHTML=
`${selected} / ${spread}`;

if(selected===spread){

setTimeout(()=>{
generateReading();
},1400);

}

});

deck.appendChild(div);

});

}

/* =========================
DEEP READING ENGINE
========================= */

function generateReading(){

const reading=
document.getElementById("readingBox");

let scores={

emotion:0,
truth:0,
movement:0,
fear:0,
avoidance:0,
attachment:0

};

currentReading.forEach(r=>{

Object.keys(scores).forEach(k=>{

scores[k]+=r.card.energy[k];

});

});

Object.keys(scores).forEach(k=>{

scores[k]=Math.floor(
scores[k]/currentReading.length
);

});

const names=
currentReading.map(r=>r.card.name);

let text="";

text+="🔮 DIVINE READING 🔮\n\n";

text+=`質問：${currentQuestion}\n\n`;

text+="━━━━━━━━━━━━━━\n\n";

currentReading.forEach(r=>{

text+=`${r.role}\n`;

text+=`${r.card.name}\n`;

text+=`${randomItem(r.card.meanings)}\n\n`;

});

text+="━━━━━━━━━━━━━━\n\n";

text+="【感情構造】\n\n";

if(scores.emotion>=80){

text+=
"感情エネルギーはかなり強く出ています。\n";

}else if(scores.emotion>=55){

text+=
"感情は存在していますが、波があります。\n";

}else{

text+=
"感情面はまだ閉鎖的です。\n";

}

if(scores.avoidance>=70){

text+=
"しかし同時に“感情を見せる恐れ”がかなり強く出ています。\n";

}

if(scores.fear>=70){

text+=
"特に傷つくこと・失うことへの警戒が強いです。\n";

}

text+="\n";

text+="【潜在意識】\n\n";

if(names.includes("ROMANCE")){

text+=
"相手側の感情自体は既に動いています。\n";

}

if(names.includes("DECEPTION")){

text+=
"ただし本音はかなり抑圧されています。\n";

text+=
"これは悪意というより“防衛反応”です。\n";

}

if(names.includes("WAIT")){

text+=
"現状は感情不足ではなく、停止状態です。\n";

}

if(names.includes("FALSE HOPE")){

text+=
"質問者側の理想化も強く混ざっています。\n";

}

text+="\n";

text+="【矛盾解析】\n\n";

if(
names.includes("ROMANCE")
&&
names.includes("DECEPTION")
){

text+=
"感情はあります。しかし同時に、その感情を認めることを恐れています。\n";

}

if(
names.includes("YES")
&&
names.includes("WAIT")
){

text+=
"流れ自体は悪くありません。ただしタイミングが一致していません。\n";

}

if(
names.includes("SOULMATE")
&&
names.includes("NO")
){

text+=
"魂レベルでは強く惹かれていても、現実では成立困難な障害があります。\n";

}

text+="\n";

text+="【心理分析】\n\n";

if(
scores.attachment>=80
&&
scores.avoidance>=60
){

text+=
"近づきたい気持ちと逃げたい気持ちが同時存在しています。\n";

}

if(
scores.fear>=70
&&
scores.avoidance>=70
){

text+=
"相手は感情そのものより、“感情によって起きる変化”を恐れています。\n";

}

if(scores.movement>=70){

text+=
"停滞を破る動きは今後発生しやすいです。\n";

}else{

text+=
"今はまだ流れが固定され切っていません。\n";

}

text+="\n";

text+="【未来推移】\n\n";

const first=currentReading[0];
const last=
currentReading[currentReading.length-1];

if(
first.card.name==="ROMANCE"
&&
last.card.name==="WAIT"
){

text+=
"感情は動いたものの、途中で停止しています。\n";

}

if(
first.card.name==="WAIT"
&&
last.card.name==="TAKE ACTION"
){

text+=
"長い停滞後に流れが再始動する暗示があります。\n";

}

if(last.card.name==="YES"){

text+=
"最終的には前向きな方向へ収束しやすいです。\n";

}

if(last.card.name==="NO"){

text+=
"現状維持のままだと閉鎖方向へ進みやすいです。\n";

}

text+="\n";

text+="【総合結論】\n\n";

if(
scores.emotion>=80
&&
scores.avoidance>=70
){

text+=
"今回の問題は“感情不足”ではありません。\n";

text+=
"むしろ感情が強いからこそ、防衛反応も強く出ています。\n";

text+=
"相手側は既に心を動かしていますが、その感情によって関係が変化することを恐れています。\n";

text+=
"そのため現在の停滞は、無関心ではなく『感情制御』によって発生しています。\n";

}else if(scores.movement>=70){

text+=
"状況は停滞期を抜け始めています。\n";

text+=
"受け身より行動によって流れが変化する段階です。\n";

}else{

text+=
"現時点では感情・現実・タイミングが完全一致していません。\n";

text+=
"ただし水面下では感情変化が継続しています。\n";

}

reading.innerHTML=
`<h2>🔮 DIVINE READING 🔮</h2>${text}`;

reading.style.display="block";

window.scrollTo({
top:reading.offsetTop-40,
behavior:"smooth"
});

}

</script>

</body>
</html>
