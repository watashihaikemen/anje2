<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Web Music Player</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --card-color: #1a1a22;
            --text-color: #ffffff;
            --text-muted: #a0a0b0;
            --accent-color: #1db954;
            --accent-hover: #1ed760;
            --control-bg: #2a2a36;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .wrapper {
            display: flex;
            flex-direction: row;
            gap: 30px;
            width: 100%;
            max-width: 960px;
            background: rgba(255, 255, 255, 0.04);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: auto;
        }

        .player-container {
            flex: 1;
            background-color: var(--card-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            min-width: 320px;
            contain: content;
        }

        .video-screen {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .video-screen iframe, #youtube-player {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .track-info {
            text-align: center;
            margin-top: 5px;
        }

        .track-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 0.95rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--control-bg);
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
            background: var(--accent-hover);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-color);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            border-radius: 50%;
        }

        .btn:hover {
            color: var(--text-color);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-small {
            width: 36px;
            height: 36px;
            color: var(--text-muted);
        }

        .btn-medium {
            width: 46px;
            height: 46px;
            background-color: var(--control-bg);
        }

        .btn-large {
            width: 60px;
            height: 60px;
            background-color: var(--text-color);
            color: var(--bg-color);
        }

        .btn-large:hover {
            background-color: var(--accent-color);
            color: var(--text-color);
        }

        .btn.active {
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        .btn.active-once {
            color: #00e676;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.6);
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 60%;
            margin: 0 auto;
        }

        .volume-container svg {
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
        }

        .playlist-container {
            width: 380px;
            background-color: var(--card-color);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            contain: content;
        }

        .playlist-header {
            font-size: 1.1rem;
            font-weight: 700;
            border-bottom: 1px solid var(--control-bg);
            padding-bottom: 10px;
        }

        .track-list {
            list-style: none;
            overflow-y: auto;
            max-height: 400px;
            padding-right: 5px;
            position: relative;
        }

        .track-list::-webkit-scrollbar {
            width: 6px;
        }
        .track-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .track-list::-webkit-scrollbar-thumb {
            background: var(--control-bg);
            border-radius: 3px;
        }

        .track-item {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 4px;
            user-select: none;
            -webkit-user-select: none;
            will-change: transform;
        }

        .track-item:hover {
            background-color: var(--control-bg);
        }

        .track-item.playing {
            background-color: rgba(29, 185, 84, 0.15);
            border-left: 4px solid var(--accent-color);
        }

        .track-item.playing .list-title {
            color: var(--accent-color);
        }

        .track-meta {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }

        .list-title, .list-artist {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .list-artist {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .drag-handle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 40px;
            margin-left: 10px;
            cursor: grab;
            color: var(--text-muted);
            touch-action: none;
        }
        
        .drag-handle:active {
            cursor: grabbing;
            color: var(--accent-color);
        }

        .track-item.dragging {
            opacity: 0.5;
            background-color: var(--control-bg);
            border: 1px dashed var(--accent-color);
        }

        .reset-btn {
            background: none;
            border: 1px solid var(--control-bg);
            color: var(--text-muted);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-top: 5px;
            width: 100%;
            user-select: none;
            -webkit-user-select: none;
        }

        .reset-btn:hover {
            background-color: rgba(239, 68, 68, 0.1);
            border-color: #ef4444;
            color: #ef4444;
        }

        .reset-btn.confirming {
            background-color: rgba(239, 68, 68, 0.2) !important;
            border-color: #ef4444 !important;
            color: #ef4444 !important;
            font-weight: bold;
        }

        .reset-btn:active {
            transform: scale(0.98);
        }

        @media (max-width: 768px) {
            .wrapper {
                flex-direction: column;
                align-items: center;
            }
            .playlist-container {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="player-container">
        <div class="video-screen">
            <div id="youtube-player"></div>
        </div>

        <div class="track-info">
            <div id="current-title" class="track-title">曲を選択してください</div>
            <div id="current-artist" class="track-artist">-</div>
        </div>

        <div class="progress-container">
            <input type="range" id="progress-bar" class="slider" value="0" max="100" step="1">
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button id="shuffle-btn" class="btn btn-small" title="シャッフル">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20l7-7M21 3L11 13M15 21h6v-5M4 4l17 17"/></svg>
            </button>
            <button id="prev-btn" class="btn btn-medium" title="前の曲">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 7l8.5 6V6z"/></svg>
            </button>
            <button id="play-btn" class="btn btn-large" title="再生">
                <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button id="next-btn" class="btn btn-medium" title="次の曲">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button id="repeat-btn" class="btn btn-small" title="リピート: オフ">
            </button>
        </div>

        <div class="volume-container">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <input type="range" id="volume-bar" class="slider" value="50" max="100">
        </div>
    </div>

    <div class="playlist-container">
        <div class="playlist-header">プレイリスト (<span id="track-count">0</span>)</div>
        <ul id="track-list" class="track-list"></ul>
        <button id="reset-btn" class="reset-btn">状態を初期化する</button>
    </div>
</div>

<script>
    // 指定された7曲を Yellow Moon の下に追加、および「明け方」を削除
    const defaultSongs = [
        { artist: 'FLOW', title: 'Sign', id: '1ZzkfZ1muU8' },
        { artist: '山猿', title: '風', id: 'HSy8gTntRhg' },
        { artist: '犬飼 feat. GUMI', title: '偶像崇拝', id: '9uJF7vWI1cM' },
        { artist: 'Akeboshi', title: 'Yellow Moon', id: 'QkzBzmsvD_M' },
        { artist: '熊木杏里', title: '君の文字', id: 'ME0-xB3E2NE' },
        { artist: 'ZHIEND', title: 'Fallin\'（Japanese）', id: '1lVjI6H6sLU' },
        { artist: 'ZHIEND', title: 'Adore（Japanese）', id: 'ODyn78tAxnQ' },
        { artist: 'ZHIEND', title: 'Live for you（Japanese）', id: 'zcATi_CvnGo' },
        { artist: 'ZHIEND', title: 'Heavy Rain（Japanese）', id: 'Qg6JZhw1HHs' },
        { artist: '多田葵', title: '灼け落ちない翼', id: '1MsuXjTlCGE' },
        { artist: '西森柚咲（内田真礼）', title: '灼け落ちない翼（How-Low-Hello Ver.）', id: '08yDMb4d_-8' },
        { artist: 'カネコアヤノ', title: '恋しい日々', id: 'K1XlKpqqA24' },
        { artist: 'カネコアヤノ', title: '眠れない', id: 'wyLuh2uC0cg' },
        { artist: 'カネコアヤノ', title: 'マジックペンと君の名前', id: 'hACjZqwsTvo' },
        { artist: '羊文学', title: 'step', id: '_g4fVuwgUg0' },
        { artist: '羊文学', title: 'ハイウェイ', id: '6xmtzQu-aaU' },
        { artist: '羊文学', title: '1999', id: '2v8iq3tI0gM' },
        { artist: '羊文学', title: 'マフラー', id: 'qF-4iBz-2zI' },
        { artist: 'Laura day romance', title: 'Young Life', id: 'TL2T4PoJNWQ' },
        { artist: 'teto', title: '9月になること', id: 'Ng3tAEa0NQM' },
        { artist: 'teto', title: 'My i my', id: 'WuK9IgIt_Vg' },
        { artist: 'Helsinki Lambda Club', title: 'Lost in the super market', id: 'sFikoHALzng' },
        { artist: 'オレンジスパイニクラブ', title: '敏感少女', id: 'OWwex9TXz08' },
        { artist: 'オレンジスパイニクラブ', title: 'デイリーネイビークレイジー', id: 'tTNp5XLiFQs' },
        { artist: 'オレンジスパイニクラブ', title: 'タルパ', id: '1aIpRDODQrQ' }
    ];

    let songs = JSON.parse(localStorage.getItem('wm_songs')) || defaultSongs;
    let currentIndex = parseInt(localStorage.getItem('wm_currentIndex')) || 0;
    let isShuffle = localStorage.getItem('wm_isShuffle') === 'true';
    let repeatMode = parseInt(localStorage.getItem('wm_repeatMode')) || 0; 
    let currentVolume = parseInt(localStorage.getItem('wm_volume')) || 50;

    // 【最適化】新しい楽曲の追加・古い楽曲の削除を自動検知し、古いストレージキャッシュを強制的に更新するロジック
    const hasNewSong = songs.some(s => s.id === 'ME0-xB3E2NE');
    const hasOldSong = songs.some(s => s.id === 'PtGONkpggjo');
    if (!hasNewSong || hasOldSong) {
        songs = [...defaultSongs];
        currentIndex = 0;
        localStorage.setItem('wm_songs', JSON.stringify(songs));
        localStorage.setItem('wm_currentIndex', currentIndex);
    }

    if (currentIndex >= songs.length || currentIndex < 0) currentIndex = 0;

    let player;
    let isPlaying = false;
    let updateTimer;

    const trackListEl = document.getElementById('track-list');
    const trackCountEl = document.getElementById('track-count');
    const currentTitleEl = document.getElementById('current-title');
    const currentArtistEl = document.getElementById('current-artist');
    const playBtn = document.getElementById('play-btn');
    const playIcon = document.getElementById('play-icon');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const repeatBtn = document.getElementById('repeat-btn');
    const progressBar = document.getElementById('progress-bar');
    const volumeBar = document.getElementById('volume-bar');
    const currentTimeEl = document.getElementById('current-time');
    const totalDurationEl = document.getElementById('total-duration');
    const resetBtn = document.getElementById('reset-btn');

    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function initPlaylist() {
        trackCountEl.textContent = songs.length;
        trackListEl.innerHTML = '';
        
        songs.forEach((song, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentIndex ? 'playing' : ''}`;
            li.setAttribute('draggable', 'true');
            li.setAttribute('data-index', index);
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'track-meta';
            metaDiv.innerHTML = `
                <div class="list-title">${song.title}</div>
                <div class="list-artist">${song.artist}</div>
            `;
            metaDiv.addEventListener('click', () => {
                selectTrack(index);
                player.playVideo();
            });

            const handleDiv = document.createElement('div');
            handleDiv.className = 'drag-handle';
            handleDiv.innerHTML = `
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="4" y1="8" x2="20" y2="8"></line>
                    <line x1="4" y1="16" x2="20" y2="16"></line>
                </svg>
            `;

            li.appendChild(metaDiv);
            li.appendChild(handleDiv);

            li.addEventListener('dragstart', handleDragStart);
            li.addEventListener('dragend', handleDragEnd);

            handleDiv.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handleTouchStart(e, li);
            }, { passive: false });

            trackListEl.appendChild(li);
        });

        trackListEl.addEventListener('dragover', handleDragOver);
        trackListEl.addEventListener('drop', handleDrop);

        updatePlayerUI();
    }

    function handleDragStart(e) {
        this.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragEnd(e) {
        this.classList.remove('dragging');
        finalizeOrder();
    }

    let dragOverTick = false;
    function handleDragOver(e) {
        e.preventDefault();
        if (dragOverTick) return;
        dragOverTick = true;
        
        requestAnimationFrame(() => {
            const draggingItem = trackListEl.querySelector('.dragging');
            if (draggingItem) {
                const nextSibling = getDragAfterElement(trackListEl, e.clientY);
                trackListEl.insertBefore(draggingItem, nextSibling);
            }
            dragOverTick = false;
        });
    }

    function handleDrop(e) {
        e.preventDefault();
    }

    let activeTouchElement = null;

    function handleTouchStart(e, targetLi) {
        activeTouchElement = targetLi;
        activeTouchElement.classList.add('dragging');
        
        window.addEventListener('touchmove', handleTouchMove, { passive: false });
        window.addEventListener('touchend', handleTouchEnd);
    }

    let touchMoveTick = false;
    function handleTouchMove(e) {
        if (!activeTouchElement) return;
        e.preventDefault(); 
        if (touchMoveTick) return;
        touchMoveTick = true;

        requestAnimationFrame(() => {
            if (activeTouchElement) {
                const touch = e.touches[0];
                const nextSibling = getDragAfterElement(trackListEl, touch.clientY);
                trackListEl.insertBefore(activeTouchElement, nextSibling);
            }
            touchMoveTick = false;
        });
    }

    function handleTouchEnd(e) {
        if (activeTouchElement) {
            activeTouchElement.classList.remove('dragging');
            activeTouchElement = null;
            finalizeOrder();
        }
        window.removeEventListener('touchmove', handleTouchMove);
        window.removeEventListener('touchend', handleTouchEnd);
    }

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.track-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function finalizeOrder() {
        const items = [...trackListEl.querySelectorAll('.track-item')];
        const newSongs = [];
        let newCurrentIndex = currentIndex;
        
        items.forEach((item, newIdx) => {
            const oldIdx = parseInt(item.getAttribute('data-index'));
            newSongs.push(songs[oldIdx]);
            item.setAttribute('data-index', newIdx);
            if (item.classList.contains('playing')) {
                newCurrentIndex = newIdx;
            }
        });
        
        songs = newSongs;
        currentIndex = newCurrentIndex;
        localStorage.setItem('wm_songs', JSON.stringify(songs));
        localStorage.setItem('wm_currentIndex', currentIndex);
    }

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '100%',
            width: '100%',
            videoId: songs[currentIndex].id,
            playerVars: {
                'controls': 0,
                'disablekb': 1,
                'rel': 0,
                'modestbranding': 1,
                'showinfo': 0,
                'iv_load_policy': 3
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        initPlaylist();
        volumeBar.value = currentVolume;
        player.setVolume(currentVolume);
        shuffleBtn.classList.toggle('active', isShuffle);
        updateRepeatButtonUI();

        progressBar.addEventListener('input', onSeek);
        volumeBar.addEventListener('input', onVolumeChange);
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            isPlaying = true;
            setPlayIcon(true);
            startTimer();
            progressBar.max = Math.floor(player.getDuration());
            totalDurationEl.textContent = formatTime(player.getDuration());
        } else if (event.data === YT.PlayerState.PAUSED) {
            isPlaying = false;
            setPlayIcon(false);
            clearInterval(updateTimer);
        } else if (event.data === YT.PlayerState.ENDED) {
            clearInterval(updateTimer);
            handleTrackEnded();
        }
    }

    function setPlayIcon(playing) {
        if (playing) {
            playIcon.innerHTML = `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`;
            playBtn.title = "一時停止";
        } else {
            playIcon.innerHTML = `<path d="M8 5v14l11-7z"/>`;
            playBtn.title = "再生";
        }
    }

    function selectTrack(index) {
        if (index < 0 || index >= songs.length) return;
        currentIndex = index;
        localStorage.setItem('wm_currentIndex', currentIndex);
        
        const items = trackListEl.querySelectorAll('.track-item');
        items.forEach((item, idx) => {
            if (idx === currentIndex) {
                item.classList.add('playing');
                if (window.innerWidth > 768) {
                    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } else {
                item.classList.remove('playing');
            }
        });

        updatePlayerUI();
        player.loadVideoById(songs[currentIndex].id);
    }

    function updatePlayerUI() {
        currentTitleEl.textContent = songs[currentIndex].title;
        currentArtistEl.textContent = songs[currentIndex].artist;
        progressBar.value = 0;
        currentTimeEl.textContent = "0:00";
    }

    function startTimer() {
        clearInterval(updateTimer);
        updateTimer = setInterval(() => {
            if (player && typeof player.getCurrentTime === 'function') {
                const current = Math.floor(player.getCurrentTime());
                progressBar.value = current;
                currentTimeEl.textContent = formatTime(current);
            }
        }, 1000);
    }

    function onSeek() {
        player.seekTo(progressBar.value, true);
        currentTimeEl.textContent = formatTime(progressBar.value);
    }

    function onVolumeChange() {
        currentVolume = volumeBar.value;
        player.setVolume(currentVolume);
        localStorage.setItem('wm_volume', currentVolume);
    }

    function handleTrackEnded() {
        if (repeatMode === 2) {
            player.playVideo();
        } else {
            nextTrack(true);
        }
    }

    function nextTrack(isAutoEnd = false) {
        if (isShuffle) {
            let randomIndex = currentIndex;
            if (songs.length > 1) {
                while (randomIndex === currentIndex) {
                    randomIndex = Math.floor(Math.random() * songs.length);
                }
            }
            selectTrack(randomIndex);
            player.playVideo();
        } else {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= songs.length) {
                if (repeatMode === 1 || !isAutoEnd) {
                    nextIndex = 0;
                    selectTrack(nextIndex);
                    player.playVideo();
                } else {
                    isPlaying = false;
                    setPlayIcon(false);
                }
            } else {
                selectTrack(nextIndex);
                player.playVideo();
            }
        }
    }

    function prevTrack() {
        let prevIndex = currentIndex - 1;
        if (prevIndex < 0) prevIndex = songs.length - 1;
        selectTrack(prevIndex);
        player.playVideo();
    }

    function updateRepeatButtonUI() {
        if (repeatMode === 0) {
            repeatBtn.className = "btn btn-small";
            repeatBtn.title = "リピート: オフ";
            repeatBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>`;
        } else if (repeatMode === 1) {
            repeatBtn.className = "btn btn-small active";
            repeatBtn.title = "リピート: 全曲";
            repeatBtn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>`;
        } else if (repeatMode === 2) {
            repeatBtn.className = "btn btn-small active-once";
            repeatBtn.title = "リピート: 1曲";
            repeatBtn.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 1l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/>
                    <text x="9" y="15" font-size="8" font-family="Arial" font-weight="bold" fill="currentColor" stroke="none">1</text>
                </svg>`;
        }
    }

    // 【最適化】String.prototype.padStart を使用した、高速かつ記述のシンプルなゼロパディング処理
    const formatTime = (seconds) => {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${String(secs).padStart(2, '0')}`;
    }

    playBtn.addEventListener('click', () => {
        if (isPlaying) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    });

    nextBtn.addEventListener('click', () => nextTrack(false));
    prevBtn.addEventListener('click', prevTrack);

    shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active', isShuffle);
        localStorage.setItem('wm_isShuffle', isShuffle);
    });

    repeatBtn.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3;
        localStorage.setItem('wm_repeatMode', repeatMode);
        updateRepeatButtonUI();
    });

    let isResetConfirming = false;
    let resetTimer;

    resetBtn.addEventListener('click', () => {
        if (!isResetConfirming) {
            isResetConfirming = true;
            resetBtn.textContent = '本当に初期化しますか？（もう一度タップ）';
            resetBtn.classList.add('confirming');

            resetTimer = setTimeout(() => {
                cancelResetState();
            }, 4000);
        } else {
            clearTimeout(resetTimer);
            executePlaylistReset();
        }
    });

    function cancelResetState() {
        isResetConfirming = false;
        resetBtn.textContent = '状態を初期化する';
        resetBtn.classList.remove('confirming');
    }

    function executePlaylistReset() {
        localStorage.removeItem('wm_songs');
        localStorage.removeItem('wm_currentIndex');
        localStorage.removeItem('wm_isShuffle');
        localStorage.removeItem('wm_repeatMode');

        songs = [...defaultSongs];
        currentIndex = 0;
        isShuffle = false;
        repeatMode = 0;

        shuffleBtn.classList.toggle('active', isShuffle);
        updateRepeatButtonUI();
        initPlaylist();

        if (player && typeof player.cueVideoById === 'function') {
            player.cueVideoById(songs[currentIndex].id);
        }

        cancelResetState();
    }
</script>

</body>
</html>
