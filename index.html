<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ANGEL ANSWERS ORACLE — DIVINE COSMOS</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

:root{
--bg:#020617;
--panel:rgba(15,23,42,.74);
--line:rgba(255,255,255,.08);

--gold:#facc15;
--pink:#ec4899;
--blue:#60a5fa;
--violet:#8b5cf6;
--green:#22c55e;
--red:#ef4444;
--white:#f8fafc;
}

html,body{
min-height:100%;
}

body{
font-family:
"Segoe UI",
sans-serif;

background:
radial-gradient(circle at top,#4338ca 0%,#0f172a 38%,#020617 100%);

color:white;
overflow-x:hidden;
position:relative;
}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
opacity:.12;
background-image:
radial-gradient(rgba(255,255,255,.95) 1px,transparent 1px);
background-size:42px 42px;
animation:stars 120s linear infinite;
}

body::after{
content:"";
position:fixed;
inset:-40%;
pointer-events:none;

background:
radial-gradient(circle,rgba(139,92,246,.18),transparent 60%),
radial-gradient(circle,rgba(96,165,250,.14),transparent 65%),
radial-gradient(circle,rgba(236,72,153,.10),transparent 70%);

filter:blur(100px);

animation:aurora 24s ease infinite alternate;
}

@keyframes aurora{
0%{
transform:translate(-4%,-4%) rotate(0deg);
}
100%{
transform:translate(4%,4%) rotate(10deg);
}
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(140px);
}
}

.container{
max-width:1700px;
margin:auto;
padding:24px;
position:relative;
z-index:2;
}

.title{
font-size:58px;
font-weight:900;
letter-spacing:3px;
text-align:center;
margin-top:10px;
text-shadow:
0 0 30px rgba(255,255,255,.4),
0 0 60px rgba(139,92,246,.5);
}

.subtitle{
text-align:center;
margin-top:12px;
color:#cbd5e1;
font-size:14px;
letter-spacing:4px;
margin-bottom:35px;
}

.panel{
background:var(--panel);
backdrop-filter:blur(18px);
border:1px solid var(--line);
border-radius:32px;
padding:28px;
margin-bottom:28px;

box-shadow:
0 0 40px rgba(0,0,0,.45),
inset 0 0 40px rgba(255,255,255,.02);
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:22px;
}

label{
display:block;
font-size:13px;
letter-spacing:2px;
margin-bottom:10px;
margin-top:18px;
color:#dbeafe;
}

textarea,
select,
button{
width:100%;
border:none;
border-radius:18px;
padding:16px;
font-size:16px;
}

textarea,
select{
background:#020617;
color:white;
}

textarea{
resize:none;
min-height:120px;
}

button{
font-weight:900;
cursor:pointer;
transition:.35s;
}

.mainBtn{
margin-top:24px;

background:
linear-gradient(135deg,#8b5cf6,#6366f1);

color:white;
}

.mainBtn:hover{
transform:translateY(-3px) scale(1.01);

box-shadow:
0 0 35px rgba(139,92,246,.5);
}

.status{
margin-top:24px;
text-align:center;
color:#cbd5e1;
min-height:24px;
letter-spacing:1px;
}

.deckZone{
display:none;
margin-top:35px;
}

.deckGuide{
text-align:center;
margin-bottom:24px;
color:#e2e8f0;
font-size:15px;
letter-spacing:2px;
}

.selectionCount{
text-align:center;
margin-bottom:20px;
font-size:18px;
font-weight:900;
color:#facc15;
}

.massDeck{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(110px,1fr));
gap:18px;
}

.pickCard{
position:relative;
aspect-ratio:2/3;
cursor:pointer;
perspective:1600px;
transform-style:preserve-3d;
}

.pickInner{
position:absolute;
inset:0;
transition:1s;
transform-style:preserve-3d;
}

.pickCard.selected .pickInner{
transform:rotateY(180deg);
}

.pickFace{
position:absolute;
inset:0;
border-radius:22px;
backface-visibility:hidden;
overflow:hidden;
}

.pickBack{
background:
linear-gradient(135deg,#4338ca,#1e1b4b);

border:
2px solid rgba(255,255,255,.1);

box-shadow:
0 0 35px rgba(139,92,246,.35),
inset 0 0 20px rgba(255,255,255,.06);

display:flex;
align-items:center;
justify-content:center;
font-size:42px;

transition:.4s;
}

.pickCard:hover .pickBack{
transform:
translateY(-8px)
rotateZ(-1deg);
}

.pickBack::before{
content:"✦";
animation:float 3s ease infinite;
}

.pickBack::after{
content:"";
position:absolute;
inset:8px;
border-radius:18px;
border:1px solid rgba(255,255,255,.12);
}

.pickFront{
transform:rotateY(180deg);

rgba(15,23,42,.97);

border:
1px solid rgba(255,255,255,.08);

}

.cardName{

.cardMeaning{

.positive .cardName{

}

.negative .cardName{

}

.love .cardName{
color:#f472b6;
}

.action .cardName{
color:#fb923c;
}

.spiritual .cardName{

}

.shadow .cardName{

}

.special{
animation:special 2s infinite;
}

@keyframes special{
0%{
box-shadow:0 0 10px gold;
}
50%{
box-shadow:0 0 45px gold;
}
100%{
box-shadow:0 0 10px gold;
}
}

.reading{

margin-top:35px;

padding:36px;
border-radius:32px;

background:
rgba(15,23,42,.84);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(16px);

}

.reading h2{

.reading p{
margin-bottom:18px;

}

.tags{

.tag{
display:inline-block;
padding:8px 14px;
border-radius:999px;
background:#312e81;
margin:4px;
font-size:13px;
}

.mysticLine{
margin:28px 0;
height:1px;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.3),
transparent

.fateMeter{
margin-top:30px;
}

.fateLabel{
margin-bottom:10px;

.fateBar{
height:16px;
border-radius:999px;

}

.fateFill{
height:100%;

linear-gradient(
90deg,
#8b5cf6,
#facc15

.whisper{

border-radius:22px;

font-style:italic;

border:1px solid rgba(255,255,255,.06);
}

.hiddenEvent{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
z-index:999;
}

.feather{
position:absolute;
font-size:24px;
animation:fall linear forwards;
opacity:.85;
}

@keyframes fall{
0%{
transform:
translateY(-10vh)
rotate(0deg);
opacity:0;
}
15%{
opacity:1;
}
100%{
transform:
translateY(110vh)
translateX(100px)
rotate(360deg);

}

@keyframes float{

transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}

.loadingRitual{

text-align:center;
padding:40px 0;
}

.orbit{
width:140px;
height:140px;
margin:auto;
position:relative;
}

.orbitCore{
position:absolute;
inset:35px;
border-radius:50%;
background:
radial-gradient(circle,#8b5cf6,transparent 75%);
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
letter-spacing:3px;
}

.ring{
position:absolute;
inset:0;
border-radius:50%;
border:
1px solid rgba(255,255,255,.14);

animation:spin 10s linear infinite;
}

.ring:nth-child(2){
inset:15px;
animation-direction:reverse;
animation-duration:7s;
}

@keyframes spin{
from{
transform:rotate(0deg);
}
to{
transform:rotate(360deg);

@media(max-width:900px){

.grid{
grid-template-columns:1fr;

.title{

}

.massDeck{

repeat(2,1fr);
}

.reading{
padding:22px;
}

}

@media(prefers-reduced-motion:reduce){

*{
animation:none !important;
transition:none !important;
}

}

</style>
</head>

<script>

const audioCtx=
new(window.AudioContext||window.webkitAudioContext)();

function tone(freq,duration=.4,type="sine",volume=.03){

const osc=audioCtx.createOscillator();
const gain=audioCtx.createGain();

osc.type=type;
osc.frequency.value=freq;

osc.connect(gain);
gain.connect(audioCtx.destination);

gain.gain.setValueAtTime(volume,audioCtx.currentTime);

gain.gain.exponentialRampToValueAtTime(
0.0001,
audioCtx.currentTime+duration
);

osc.start();
osc.stop(audioCtx.currentTime+duration);

}

function secureRandom(max){

const arr=new Uint32Array(1);

crypto.getRandomValues(arr);

return arr[0]%max;

}

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

const j=secureRandom(i+1);

[arr[i],arr[j]]=[arr[j],arr[i]];

}

}

function pick(arr){

return arr[secureRandom(arr.length)];

}

function escapeHTML(str){

return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}

},

{

weight:1,

]
},

{

weight:7,

},

{

},

{

{

{

];

let selectedCards=[];
let spreadCount=0;
let currentQuestion="";
let currentTheme="";

function weightedDeck(){

let pool=[];

cards.forEach(card=>{

let w=card.weight;

if(currentTheme==="love"){

if(card.type.includes("love")) w+=3;

}

if(currentTheme==="spiritual"){

if(card.type.includes("spiritual")) w+=3;

}

if(currentTheme==="work"){

if(
card.name==="SUCCESS"||
card.name==="OPPORTUNITY"||
card.name==="TAKE ACTION"
){
w+=3;
}

}

for(let i=0;i<w;i++){

pool.push({...card});

}

});

shuffle(pool);

return pool;

}

function beginOracle(){

const q=
document
.getElementById("question")
.value
.trim();

if(!q){

alert("質問を入力してください");
return;

}

currentQuestion=q;

currentTheme=
document.getElementById("theme").value;

spreadCount=parseInt(
document.getElementById("spread").value
);

selectedCards=[];

document.getElementById("reading")
.style.display="none";

document.getElementById("deckZone")
.style.display="none";

document.getElementById("loadingRitual")
.style.display="block";

document.getElementById("status")
.innerHTML=
"天使達と接続しています...";

tone(432,2,"sine",.03);

setTimeout(createDeck,3500);

}

function createDeck(){

document.getElementById("loadingRitual")
.style.display="none";

document.getElementById("deckZone")
.style.display="block";

document.getElementById("status")
.innerHTML=
"直感でカードを選んでください";

document.getElementById("selectionCount")
.innerHTML=
`0 / ${spreadCount}`;

const massDeck=
document.getElementById("massDeck");

massDeck.innerHTML="";

let deck=weightedDeck();

shuffle(deck);

const displayDeck=[];

for(let i=0;i<28;i++){

displayDeck.push(
deck[secureRandom(deck.length)]
);

}

displayDeck.forEach((card,index)=>{

const div=document.createElement("div");

div.className="pickCard";

const roleName=
roles[spreadCount][selectedCards.length]||"";

const meaning=pick(card.meanings);

const rare=
secureRandom(100)<5
? "special"
: "";

div.innerHTML=`

<div class="pickInner">

<div class="pickFace pickBack ${rare}">
</div>

<div class="pickFace pickFront ${card.type}">

<div class="role">
${roleName}
</div>

<div class="cardName">
${card.name}
</div>

<div class="cardMeaning">
${meaning}
</div>

</div>

</div>

`;

let opened=false;

div.addEventListener("click",()=>{

if(opened) return;

if(selectedCards.length>=spreadCount)
return;

opened=true;

div.classList.add("selected");

tone(
[
444,
555,
777,
888
][secureRandom(4)],
.5
);

selectedCards.push({
role:
roles[spreadCount][selectedCards.length],
card,
meaning
});

document.getElementById("selectionCount")
.innerHTML=
`${selectedCards.length} / ${spreadCount}`;

if(card.name==="MIRACLE"){

featherRain();

}

if(selectedCards.length===spreadCount){

document.getElementById("status")
.innerHTML=
"神託を読み解いています...";

setTimeout(generateReading,2200);

}

});

massDeck.appendChild(div);

});

}

function featherRain(){

document.getElementById("hiddenEvent");

for(let i=0;i<25;i++){

const feather=
document.createElement("div");

feather.className="feather";

feather.innerHTML="🪽";

feather.style.left=
Math.random()*100+"vw";

feather.style.animationDuration=
4+Math.random()*5+"s";

feather.style.fontSize=
20+Math.random()*20+"px";

zone.appendChild(feather);

setTimeout(()=>{

feather.remove();

},8000);

}

}

function generateReading(){

const reading=
document.getElementById("reading");

const names=
selectedCards.map(c=>c.card.name);

let positivity=0;
let warning=0;
let spiritual=0;

selectedCards.forEach(c=>{

if(
c.card.type.includes("positive")
) positivity++;

if(
c.card.type.includes("negative")||
c.card.type.includes("shadow")
) warning++;

if(
c.card.type.includes("spiritual")
) spiritual++;

});

let fate=Math.min(
100,
Math.max(
8,
50+
positivity*12-
warning*8+
spiritual*5+
secureRandom(18)
)
);

let intro=pick([

"空気は既に動き始めています。",
"今回の神託はかなり感情が濃いです。",
"静かながら強い流れがあります。",
"偶然では済まされない導きがあります。",

]);

let core="";

if(names.includes("YES!")){

core+=`
願いの流れはかなり強いです。
`;

}

if(names.includes("WAIT")){

core+=`
ただし焦りは逆効果です。
`;

}

if(names.includes("ROMANCE")){

core+=`
恋愛感情や情緒的エネルギーはかなり強く出ています。
`;

}

if(names.includes("DECEPTION")){

core+=`
見えていない本音があります。
`;

}

if(names.includes("FALSE HOPE")){

core+=`
期待だけが先行している可能性があります。
`;

}

if(names.includes("TAKE ACTION")){

core+=`
小さくても行動を起こすことで流れが切り替わります。
`;

}

if(names.includes("TRUST")||
names.includes("LISTEN TO YOUR INTUITION")){

core+=`

}

if(names.includes("MIRACLE")){

core+=`
極めて稀な奇跡級カードが出ています。運命が通常とは違う動きをしています。
`;

}

if(core===""){

core=
"未来はまだ固定されていません。ただ、今の選択が大きな分岐点になるでしょう。";

}

let whisper=pick([

"あなたは既に違和感に気づいています。",

"心より先に魂が反応しています。",

"見ないふりを続けているものがあります。",

"運命は静かに方向を変え始めています。",

"今回の流れは偶然ではありません。",

"恐れより直感を優先してください。"

]);

let html=`

<h2>
🔮 DIVINE READING 🔮
</h2>

<p>
<strong>質問：</strong>
${escapeHTML(currentQuestion)}
</p>

<div class="mysticLine"></div>

`;

selectedCards.forEach(c=>{

html+=`

<p>

<strong>${c.role}</strong><br>

${c.card.name}<br>

${c.meaning}

</p>

`;

});

html+=`

<div class="mysticLine"></div>

<p>
${intro}
</p>

<p>
${core}
</p>

<div class="fateMeter">

<div class="fateLabel">
運命流動率
</div>

<div class="fateBar">
<div class="fateFill" id="fateFill"></div>
</div>

</div>

<div style="
margin-top:12px;
font-size:28px;
font-weight:900;
color:#facc15;">
${fate}%
</div>

<div class="whisper">
“ ${whisper} ”
</div>

<div class="tags">

selectedCards.forEach(c=>{

html+=`
<span class="tag">
${c.role} : ${c.card.name}
</span>

html+=`
</div>
`;

reading.innerHTML=html;

reading.style.display="block";

setTimeout(()=>{

document.getElementById("fateFill")
.style.width=fate+"%";

},300);

document.getElementById("status")
.innerHTML=
"神託が降りました";

window.scrollTo({

top:
reading.offsetTop-40,

behavior:"smooth"

});

if(fate>=90){

featherRain();

tone(999,1,"triangle",.05);

}

}

</script>

</body>
</html>
