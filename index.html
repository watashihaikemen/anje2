<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --player-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent-color: #ff0000; /* YouTubeカラーの赤 */
            --list-hover: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 1000px;
            max-width: 100%;
            height: 650px;
            background-color: var(--player-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* 左側：プレイリストエリア */
        .sidebar {
            width: 35%;
            border-right: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #282828;
        }

        .track-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .track-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #232323;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .track-item:hover {
            background-color: var(--list-hover);
        }

        .track-item.active {
            background-color: #282828;
            border-left: 4px solid var(--accent-color);
        }

        .track-item .track-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item .track-artist {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        /* 右側：メインプレイヤーエリア */
        .main-player {
            width: 65%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* 動画表示エリア */
        .video-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            margin-bottom: 25px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 現在の曲情報 */
        .now-playing {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .now-playing .current-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .current-artist {
            font-size: 1rem;
            color: var(--text-sub);
        }

        /* コントロールパネル群（外部ボタン操作用） */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            margin-bottom: 15px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .btn:hover {
            color: var(--text-main);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse;
                height: auto;
            }
            .sidebar {
                width: 100%;
                height: 300px;
            }
            .main-player {
                width: 100%;
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">プレイリスト</div>
        <ul class="track-list" id="playlist"></ul>
    </div>

    <div class="main-player">
        <div class="video-container">
            <div id="player-view"></div>
        </div>

        <div class="now-playing">
            <div class="current-title" id="current-title">曲を選択してください</div>
            <div class="current-artist" id="current-artist">-</div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-prev" title="前の曲"><i class="fas fa-step-backward"></i></button>
            <button class="btn" id="btn-play" title="再生"><i class="fas fa-play"></i></button>
            <button class="btn" id="btn-pause" title="一時停止"><i class="fas fa-pause"></i></button>
            <button class="btn" id="btn-next" title="次の曲"><i class="fas fa-step-forward"></i></button>
        </div>
    </div>
</div>

<script>
    // 指定された全16曲のYouTube公式配信音源ID
    const tracks = [
        { artist: "カネコアヤノ", title: "恋しい日々", id: "O0aA77rXw0M" },
        { artist: "カネコアヤノ", title: "眠れない", id: "5o6L437vQjE" },
        { artist: "カネコアヤノ", title: "マジックペンと君の名前", id: "fN-99e2X1zY" },
        { artist: "カネコアヤノ", title: "明け方", id: "1vY-iXvUe9Q" },
        { artist: "羊文学", title: "step", id: "8W_tX770Txs" },
        { artist: "羊文学", title: "ハイウェイ", id: "S4bT6tLw2cM" },
        { artist: "羊文学", title: "1999", id: "S6pE0NWhuU0" },
        { artist: "羊文学", title: "マフラー", id: "6-Uq6q9f0zM" },
        { artist: "Laura day romance", title: "Young Life", id: "o2Lg6E1rC0I" },
        { artist: "teto", title: "9月になること", id: "nEorl9wM_xM" },
        { artist: "teto", title: "My i my", id: "p0vDRE7C4m4" },
        { artist: "Helsinki Lambda Club", title: "Lost in the super market", id: "SWeuVz1wO_k" },
        { artist: "オレンジスパイニクラブ", title: "敏感少女", id: "FpCH_0_5KTo" },
        { artist: "オレンジスパイニクラブ", title: "デイリーネイビークレイジー", id: "zW1S8w9M6_Q" },
        { artist: "オレンジスパイニクラブ", title: "タルパ", id: "U-o_MbeE9-w" },
        { artist: "オレンジスパイニクラブ", title: "デイリーネイビークレイジー (2)", id: "zW1S8w9M6_Q" }
    ];

    let player;
    let currentIndex = 0;

    // YouTube API スクリプトのインジェクト
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    // APIの準備完了時
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player-view', {
            videoId: tracks[currentIndex].id,
            playerVars: {
                'rel': 0,
                'playsinline': 1,
                'autoplay': 0,
                'controls': 1 // 確実にシークバーやYouTubeUIでも触れるように設定
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        renderPlaylist();
        updateTrackUI();
    }

    // リストの描画
    function renderPlaylist() {
        const playlistEl = document.getElementById('playlist');
        playlistEl.innerHTML = '';
        tracks.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentIndex ? 'active' : ''}`;
            li.innerHTML = `
                <span class="track-title">${track.title}</span>
                <span class="track-artist">${track.artist}</span>
            `;
            li.onclick = () => selectTrack(index);
            playlistEl.appendChild(li);
        });
    }

    // 曲の切り替え
    function loadTrack(index) {
        currentIndex = index;
        updateTrackUI();
        player.loadVideoById(tracks[currentIndex].id);
    }

    function updateTrackUI() {
        const track = tracks[currentIndex];
        document.getElementById('current-title').innerText = track.title;
        document.getElementById('current-artist').innerText = track.artist;

        const items = document.querySelectorAll('.track-item');
        items.forEach((item, idx) => {
            if (idx === currentIndex) {
                item.classList.add('active');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                item.classList.remove('active');
            }
        });
    }

    function selectTrack(index) {
        loadTrack(index);
    }

    // 曲終了時の自動次曲送り
    function onPlayerStateChange(event) {
        if (event.data == YT.PlayerState.ENDED) {
            nextTrack();
        }
    }

    function nextTrack() {
        let nextIndex = (currentIndex + 1) % tracks.length;
        loadTrack(nextIndex);
    }

    function prevTrack() {
        let nextIndex = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(nextIndex);
    }

    // ボタン類の制御
    document.getElementById('btn-play').addEventListener('click', () => { if(player) player.playVideo(); });
    document.getElementById('btn-pause').addEventListener('click', () => { if(player) player.pauseVideo(); });
    document.getElementById('btn-next').addEventListener('click', nextTrack);
    document.getElementById('btn-prev').addEventListener('click', prevTrack);

</script>
</body>
</html>
