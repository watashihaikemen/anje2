<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

:root{

--line:rgba(255,255,255,.08);
--gold:#facc15;
--pink:#ec4899;
--blue:#60a5fa;
--green:#22c55e;

html,body{

body{

background:
radial-gradient(circle at top,#4338ca 0%,#0f172a 38%,#020617 100%);

overflow-x:hidden;

}

body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
opacity:.12;
background-image:
radial-gradient(rgba(255,255,255,.9) 1px,transparent 1px);
background-size:42px 42px;
animation:stars 90s linear infinite;
}

body::after{
content:"";
position:fixed;
inset:-40%;
pointer-events:none;
background:
radial-gradient(circle,rgba(139,92,246,.18),transparent 60%),
radial-gradient(circle,rgba(96,165,250,.14),transparent 65%),
radial-gradient(circle,rgba(236,72,153,.12),transparent 70%);
filter:blur(100px);
animation:aurora 20s ease infinite alternate;
}

@keyframes aurora{
0%{
transform:translate(-5%,-5%) rotate(0deg);
}
100%{
transform:translate(5%,5%) rotate(12deg);
}
}

@keyframes stars{
from{
transform:translateY(0);
}
to{
transform:translateY(140px);
}
}

.container{

margin:auto;
padding:24px;
position:relative;
z-index:1;
}

.title{

font-size:54px;

.panel{

0 0 40px rgba(0,0,0,.45),

.grid{

label{

}

textarea,
select,

textarea,

}

textarea{

}

button{

}

.mainBtn{
background:linear-gradient(135deg,#8b5cf6,#6366f1);

.mainBtn:hover{

.secondaryBtn{

.deleteBtn{

}

}

.deleteBtn:hover{

.status{

@keyframes breathe{
0%{
transform:scale(.85);
opacity:.7;
}
50%{
transform:scale(1.1);
opacity:1;
}
100%{
transform:scale(.85);
opacity:.7;
}
}

.deckWrapper{
perspective:1800px;

}

.deck{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:18px;

}

.oracleCard{

transform-style:preserve-3d;

cursor:pointer;

}

.oracleCard.show{
opacity:1;
}

.oracleCard:hover{
transform:translateY(-10px) rotateZ(-1deg);
}

.oracleCard.flipped{
transform:rotateY(180deg);
}

.face{
position:absolute;
inset:0;

border-radius:24px;

}

.back{

align-items:center;

linear-gradient(135deg,#4338ca,#1e1b4b);

}

content:"✦";

}

.back::after{
content:"";

}

100%{

.cardMeaning{

.positive .cardTitle{

.negative .cardTitle{

.love .cardTitle{

}

.action .cardTitle{

}

.spiritual .cardTitle{

.glow{

@keyframes glow{
0%{
box-shadow:0 0 0 rgba(255,255,255,0);
}
50%{
box-shadow:0 0 35px rgba(255,255,255,.35);
}
100%{
box-shadow:0 0 0 rgba(255,255,255,0);
}

.special{

@keyframes special{
0%{

}
50%{
box-shadow:0 0 40px gold;
}
100%{
box-shadow:0 0 10px gold;
}

.readingBox{
display:none;
margin-top:35px;
padding:36px;
border-radius:30px;

.shuffleLayer{

display:none;
align-items:center;
justify-content:center;

.shuffleCard{

left:45px;
top:10px;

linear-gradient(135deg,#4338ca,#1e1b4b);

}

.shuffleCard:nth-child(2){
animation-delay:.15s;
}

.shuffleCard:nth-child(3){
animation-delay:.3s;
}

@keyframes shuffleAnim{
0%{
transform:translate(0,0) rotate(0deg);
}
25%{
transform:translate(-45px,20px) rotate(-12deg);
}
50%{
transform:translate(45px,-10px) rotate(12deg);
}
100%{
transform:translate(0,0) rotate(0deg);
}
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

.title{

}

.deck{
grid-template-columns:repeat(2,1fr);
}

.readingBox{
padding:22px;
}

}

</style>
</head>

const combos=[

{
cards:["ROMANCE","WAIT"],
text:"恋愛感情自体は存在しています。ただし今は相手側にも迷いや様子見が混ざっており、流れはまだ完全には固まっていません。"
},

{

},

},

{

},

{

},

{
cards:["SOON","ROMANCE"],

let currentReading=[];
let currentQuestion="";
let currentTheme="";

function escapeHTML(str){

return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;");

}

function secureRandom(max){

const array=new Uint32Array(1);

crypto.getRandomValues(array);

return array[0]%max;

}

function randomItem(arr){

return arr[secureRandom(arr.length)];

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=secureRandom(i+1);

[array[i],array[j]]=[array[j],array[i]];

}

}

function playTone(freq,duration){

const ctx=new(window.AudioContext||window.webkitAudioContext)();

const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.connect(gain);
gain.connect(ctx.destination);

osc.frequency.value=freq;
osc.type="sine";

gain.gain.setValueAtTime(.03,ctx.currentTime);

osc.start();

osc.stop(ctx.currentTime+duration);

}

function startRitual(){

const question=document.getElementById("question").value.trim();

if(question===""){

alert("質問を入力してください");

return;

}

document.getElementById("ritual").style.display="block";

document.getElementById("status").innerHTML=
"天使達と接続しています...";

playTone(432,1);

setTimeout(()=>{

document.getElementById("ritual").style.display="none";

startOracle();

},4000);

}

function themedDeck(){

let deck=[...angelCards];

if(currentTheme==="love"){

deck.push(
...angelCards.filter(c=>c.name==="ROMANCE")
);

}

if(currentTheme==="work"){

deck.push(
...angelCards.filter(c=>
c.name==="SUCCESS"||
c.name==="OPPORTUNITY"||
c.name==="TAKE ACTION"
)
);

}

if(currentTheme==="spiritual"){

deck.push(
...angelCards.filter(c=>
c.type==="spiritual"
)
);

}

return deck;

}

function startOracle(){

currentQuestion=
document.getElementById("question")
.value
.trim();

currentTheme=
document.getElementById("theme")
.value;

const spread=parseInt(
document.getElementById("spreadType").value
);

const deckDiv=document.getElementById("deck");

deckDiv.innerHTML="";

currentReading=[];

document.getElementById("readingBox")
.style.display="none";

document.getElementById("shuffleLayer")
.style.display="flex";

playTone(528,1);

let deck=themedDeck();

shuffle(deck);

const selected=deck.slice(0,spread);

setTimeout(()=>{

document.getElementById("shuffleLayer")
.style.display="none";

document.getElementById("status")
.innerHTML="カードを選んでください";

selected.forEach((card,index)=>{

const div=document.createElement("div");

div.className="oracleCard";

const specialChance=secureRandom(100);

let extraClass="";

if(specialChance<6){

extraClass="special";

}

const meaning=randomItem(card.meanings);

div.innerHTML=`

<div class="face back ${extraClass}"></div>

<div class="face front ${card.type}">

<div class="role">
${cardRoles[spread][index]}
</div>

<div class="cardTitle">
${card.name}
</div>

<div class="cardMeaning">
${meaning}
</div>

</div>

`;

deckDiv.appendChild(div);

setTimeout(()=>{

div.classList.add("show");

},index*100);

let opened=false;

div.addEventListener("click",()=>{

if(opened) return;

opened=true;

playTone(777,.4);

div.classList.add("flipped");
div.classList.add("glow");

currentReading.push({
role:cardRoles[spread][index],
card:card,
meaning:meaning
});

if(currentReading.length===spread){

setTimeout(generateReading,1200);

}

});

});

},2200);

}

function generateReading(){

const readingBox=document.getElementById("readingBox");

const names=currentReading.map(r=>r.card.name);

let text=`

<h2>
🔮 DIVINE READING 🔮
</h2>

<div class="readingText">

<p>
<strong>質問：</strong>
${escapeHTML(currentQuestion)}
</p>

`;

currentReading.forEach(item=>{

text+=`

<p>

<strong>${item.role}</strong><br>

${item.card.name}<br>

${item.meaning}

</p>

`;

});

text+=`
<hr style="border-color:#334155;margin:28px 0;">
`;

text+=`
<h3 style="margin-bottom:18px;">
総合神託
</h3>
`;

let finalReading="";

if(names.includes("YES!")||
names.includes("SUCCESS")){

finalReading+=`
願い自体はかなり強く現実化へ向かっています。今回のカード群には“流れが止まっていない”感覚があります。 
`;

}

if(names.includes("WAIT")){

finalReading+=`
ただし焦りは逆効果になりやすいです。今は動くことより、タイミングを整える意味が強く出ています。 
`;

}

if(names.includes("ROMANCE")){

finalReading+=`
恋愛感情や情緒的エネルギーはかなり強めです。ただ、一直線というより“揺れながら近づく”流れが見えます。 
`;

}

if(names.includes("NO!")){

finalReading+=`
一部にはかなり強い警告もあります。感情だけで突き進むと後から苦しくなる可能性があります。 
`;

}

if(names.includes("TRUST")||
names.includes("LISTEN TO YOUR INTUITION")){

finalReading+=`
今回かなり重要なのは直感です。理屈で整理しようとするほど、本来感じ取っている答えを見失いやすいでしょう。 
`;

}

if(names.includes("TAKE ACTION")||
names.includes("BE ASSERTIVE")){

finalReading+=`
受け身では運命は変わりません。小さくても行動を起こした瞬間に流れが切り替わる暗示があります。 
`;

}

combos.forEach(combo=>{

const ok=combo.cards.every(c=>
names.includes(c)
);

if(ok){

finalReading+=combo.text+" ";

}

});

if(finalReading===""){

finalReading=`
状況はまだ完全に定まっていません。ただ今回の神託は、“未来は固定されていない”ことを強く示しています。
`;

}

text+=`
<p>${finalReading}</p>
`;

text+=`
<div class="tags">
`;

currentReading.forEach(r=>{

text+=`
<span class="tag">
${r.role} : ${r.card.name}
</span>
`;

});

text+=`
</div>
</div>
`;

readingBox.innerHTML=text;

readingBox.style.display="block";

document.getElementById("status")
.innerHTML="神託が降りました";

updateStats();

window.scrollTo({
top:readingBox.offsetTop-40,
behavior:"smooth"
});

}

function saveReading(){

if(currentReading.length===0){

alert("まだ結果がありません");

return;

}

const history=
JSON.parse(
localStorage.getItem("angelOracleDivine")
)||[];

history.unshift({

date:new Date().toLocaleString(),

question:currentQuestion,

cards:currentReading

});

const limited=history.slice(0,50);

localStorage.setItem(
"angelOracleDivine",
JSON.stringify(limited)
);

loadHistory();

alert("保存しました");

}

function loadHistory(){

const history=
JSON.parse(
localStorage.getItem("angelOracleDivine")
)||[];

const content=
document.getElementById("historyContent");

if(history.length===0){

content.innerHTML=`
<div class="empty">
保存履歴はありません
</div>
`;

return;

}

let html="";

history.forEach(item=>{

html+=`

<div class="historyItem">

<div class="historyDate">
${item.date}
</div>

<div class="historyQuestion">
❓ ${escapeHTML(item.question)}
</div>

`;

item.cards.forEach(card=>{

html+=`

<span class="tag">
${card.role} : ${card.card.name}
</span>

`;

});

html+=`
</div>
`;

});

content.innerHTML=html;

}

function deleteHistory(){

if(!confirm("履歴を全削除しますか？")) return;

localStorage.removeItem("angelOracleDivine");

loadHistory();

updateStats();

}

function updateStats(){

const history=
JSON.parse(
localStorage.getItem("angelOracleDivine")
)||[];

document.getElementById("totalReadings")
.innerHTML=history.length;

const counts={};

history.forEach(item=>{

item.cards.forEach(c=>{

counts[c.card.name]=(counts[c.card.name]||0)+1;

});

});

let max=0;
let top="-";

for(let key in counts){

if(counts[key]>max){

max=counts[key];
top=key;

}

}

document.getElementById("topCard")
.innerHTML=top;

}

loadHistory();

updateStats();

</script>
