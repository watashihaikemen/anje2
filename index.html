<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --player-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent-color: #1db954; 
            --list-hover: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 940px;
            max-width: 100%;
            height: 650px;
            background-color: var(--player-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        /* 左側：プレイリストエリア */
        .sidebar {
            width: 45%;
            border-right: 1px solid #282828;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #282828;
        }

        .track-list {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
        }

        .track-item {
            padding: 14px 20px;
            cursor: pointer;
            border-bottom: 1px solid #232323;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
        }

        .track-item:hover {
            background-color: var(--list-hover);
        }

        .track-item.active {
            background-color: #282828;
            border-left: 4px solid var(--accent-color);
        }

        .track-item .track-title {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-item .track-artist {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        /* 右側：メインプレイヤーエリア */
        .main-player {
            width: 55%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* YouTube API用の隠しプレイヤー */
        #youtube-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* ジャケットアート（YouTubeサムネイルを自動反映） */
        .album-art {
            width: 280px;
            height: 280px;
            background-color: #333;
            border-radius: 8px;
            margin-bottom: 35px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            background-size: cover;
            background-position: center;
            transition: transform 0.3s;
        }

        .album-art.playing {
            transform: scale(1.02);
        }

        /* 現在の曲情報 */
        .now-playing {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
        }

        .now-playing .current-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .current-artist {
            font-size: 1rem;
            color: var(--text-sub);
        }

        /* シークバー（タイムバー） */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .time {
            font-size: 0.75rem;
            color: var(--text-sub);
            width: 45px;
        }

        .time.left { text-align: left; }
        .time.right { text-align: right; }

        .progress-bar {
            flex-grow: 1;
            height: 5px;
            background-color: #535353;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            margin: 0 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            border-radius: 3px;
        }

        /* メインコントロールボタン */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            margin-bottom: 25px;
        }

        .btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
        }

        .btn:hover {
            color: var(--text-main);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-toggle {
            color: var(--text-sub);
        }
        .btn-toggle.active {
            color: var(--accent-color);
        }

        .btn-play-pause {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background-color: var(--text-main);
            color: var(--bg-color);
            font-size: 1.4rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-play-pause:hover {
            background-color: #ffffff;
            transform: scale(1.05);
        }

        /* ボリュームコントロール */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 150px;
        }

        .volume-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 4px;
            background: #535353;
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
        }

        /* レスポンシブ（スマホ表示対応） */
        @media (max-width: 768px) {
            .container {
                flex-direction: column-reverse;
                height: auto;
                max-height: none;
            }
            .sidebar {
                width: 100%;
                height: 380px;
            }
            .main-player {
                width: 100%;
                padding: 30px 20px;
            }
            .album-art {
                width: 200px;
                height: 200px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">プレイリスト</div>
        <ul class="track-list" id="playlist"></ul>
    </div>

    <div class="main-player">
        <div id="youtube-player"></div>
        <div class="album-art" id="album-art"></div>

        <div class="now-playing">
            <div class="current-title" id="current-title">曲を選択してください</div>
            <div class="current-artist" id="current-artist">-</div>
        </div>

        <div class="progress-container">
            <span class="time left" id="time-current">0:00</span>
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time right" id="time-total">0:00</span>
        </div>

        <div class="controls">
            <button class="btn btn-toggle" id="btn-shuffle" title="シャッフル"><i class="fas fa-random"></i></button>
            <button class="btn" id="btn-prev" title="前の曲"><i class="fas fa-step-backward"></i></button>
            <button class="btn btn-play-pause" id="btn-play" title="再生/一時停止"><i class="fas fa-play"></i></button>
            <button class="btn" id="btn-next" title="次の曲"><i class="fas fa-step-forward"></i></button>
            <button class="btn btn-toggle" id="btn-repeat" title="リピート"><i class="fas fa-redo"></i></button>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-up" style="font-size: 0.9rem; color: var(--text-sub);"></i>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="50">
        </div>
    </div>
</div>

<script>
    // 指定された全楽曲の正規YouTube動画IDを最初から格納
    const tracks = [
        { artist: "カネコアヤノ", title: "恋しい日々", id: "O0aA77rXw0M" },
        { artist: "カネコアヤノ", title: "眠れない", id: "5o6L437vQjE" },
        { artist: "カネコアヤノ", title: "マジックペンと君の名前", id: "fN-99e2X1zY" },
        { artist: "カネコアヤノ", title: "明け方", id: "1vY-iXvUe9Q" },
        { artist: "羊文学", title: "step", id: "8W_tX770Txs" },
        { artist: "羊文学", title: "ハイウェイ", id: "S4bT6tLw2cM" },
        { artist: "羊文学", title: "1999", id: "S6pE0NWhuU0" },
        { artist: "羊文学", title: "マフラー", id: "6-Uq6q9f0zM" },
        { artist: "Laura day romance", title: "Young Life", id: "o2Lg6E1rC0I" },
        { artist: "teto", title: "9月になること", id: "nEorl9wM_xM" },
        { artist: "teto", title: "My i my", id: "p0vDRE7C4m4" },
        { artist: "Helsinki Lambda Club", title: "Lost in the super market", id: "SWeuVz1wO_k" },
        { artist: "オレンジスパイニクラブ", title: "敏感少女", id: "FpCH_0_5KTo" },
        { artist: "オレンジスパイニクラブ", title: "デイリーネイビークレイジー", id: "zW1S8w9M6_Q" },
        { artist: "オレンジスパイニクラブ", title: "タルパ", id: "U-o_MbeE9-w" },
        { artist: "オレンジスパイニクラブ", title: "デイリーネイビークレイジー (2)", id: "zW1S8w9M6_Q" }
    ];

    let player;
    let currentIndex = 0;
    let isPlaying = false;
    let isShuffle = false;
    let isRepeat = false;
    let updateTimer;

    // YouTube API インジェクト
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtube-player', {
            height: '1',
            width: '1',
            videoId: tracks[currentIndex].id,
            playerVars: {
                'playsinline': 1,
                'controls': 0,
                'disablekb': 1
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        renderPlaylist();
        loadTrack(currentIndex, false);
        player.setVolume(document.getElementById('volume-slider').value);
    }

    function renderPlaylist() {
        const playlistEl = document.getElementById('playlist');
        playlistEl.innerHTML = '';
        tracks.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentIndex ? 'active' : ''}`;
            li.innerHTML = `
                <span class="track-title">${track.title}</span>
                <span class="track-artist">${track.artist}</span>
            `;
            li.onclick = () => selectTrack(index);
            playlistEl.appendChild(li);
        });
    }

    function loadTrack(index, autoPlay = true) {
        currentIndex = index;
        const track = tracks[currentIndex];
        
        document.getElementById('current-title').innerText = track.title;
        document.getElementById('current-artist').innerText = track.artist;
        document.getElementById('album-art').style.backgroundImage = `url('https://img.youtube.com/vi/${track.id}/hqdefault.jpg')`;
        
        const items = document.querySelectorAll('.track-item');
        items.forEach((item, idx) => {
            if(idx === index) {
                item.classList.add('active');
                item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                item.classList.remove('active');
            }
        });

        if (autoPlay) {
            player.loadVideoById(track.id);
            player.playVideo();
        } else {
            player.cueVideoById(track.id);
        }
    }

    function selectTrack(index) {
        loadTrack(index, true);
    }

    function togglePlay() {
        if (isPlaying) {
            player.pauseVideo();
        } else {
            player.playVideo();
        }
    }

    function onPlayerStateChange(event) {
        const playBtn = document.getElementById('btn-play');
        const albumArt = document.getElementById('album-art');

        if (event.data == YT.PlayerState.PLAYING) {
            isPlaying = true;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            albumArt.classList.add('playing');
            startProgressLoop();
        } else {
            isPlaying = false;
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
            albumArt.classList.remove('playing');
            clearInterval(updateTimer);
        }

        if (event.data == YT.PlayerState.ENDED) {
            if (isRepeat) {
                player.playVideo();
            } else {
                nextTrack();
            }
        }
    }

    function nextTrack() {
        if (isShuffle) {
            let nextIndex = Math.floor(Math.random() * tracks.length);
            loadTrack(nextIndex);
        } else {
            let nextIndex = (currentIndex + 1) % tracks.length;
            loadTrack(nextIndex);
        }
    }

    function prevTrack() {
        let nextIndex = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(nextIndex);
    }

    function startProgressLoop() {
        clearInterval(updateTimer);
        updateTimer = setInterval(() => {
            if (player && player.getCurrentTime) {
                const current = player.getCurrentTime();
                const total = player.getDuration();
                if (total > 0) {
                    const pct = (current / total) * 100;
                    document.getElementById('progress-fill').style.width = pct + '%';
                    document.getElementById('time-current').innerText = formatTime(current);
                    document.getElementById('time-total').innerText = formatTime(total);
                }
            }
        }, 400);
    }

    function formatTime(seconds) {
        const min = Math.floor(seconds / 60);
        const sec = Math.floor(seconds % 60);
        return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    // イベント群の紐付け
    document.getElementById('btn-play').addEventListener('click', togglePlay);
    document.getElementById('btn-next').addEventListener('click', nextTrack);
    document.getElementById('btn-prev').addEventListener('click', prevTrack);

    document.getElementById('btn-shuffle').addEventListener('click', function() {
        isShuffle = !isShuffle;
        this.classList.toggle('active', isShuffle);
    });

    document.getElementById('btn-repeat').addEventListener('click', function() {
        isRepeat = !isRepeat;
        this.classList.toggle('active', isRepeat);
    });

    document.getElementById('volume-slider').addEventListener('input', function(e) {
        if(player) player.setVolume(e.target.value);
    });

    document.getElementById('progress-bar').addEventListener('click', function(e) {
        if (player && player.getDuration) {
            const rect = this.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const pct = clickX / width;
            const seekTo = player.getDuration() * pct;
            player.seekTo(seekTo, true);
        }
    });
</script>
</body>
</html>
